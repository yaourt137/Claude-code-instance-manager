function connectWS() {
  if (!location.host) {
    setWsStatus(false);
    const wsSt = document.getElementById('ws-status');
    wsSt.textContent = t('header.demo_mode');
    wsSt.dataset.wsState = 'demo';
    loadDemoData();
    return;
  }
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  try { ws = new WebSocket(`${proto}://${location.host}`); } catch(e) { return; }
  ws.onopen  = () => { console.log('[DIAG] WS connected'); setWsStatus(true); clearTimeout(wsReconnectTimer); };
  ws.onclose = () => { console.log('[DIAG] WS disconnected'); setWsStatus(false); wsReconnectTimer = setTimeout(connectWS, 3000); };
  ws.onerror = () => setWsStatus(false);
  ws.onmessage = e => { try { handleWS(JSON.parse(e.data)); } catch(_){} };
}
function setWsStatus(ok) {
  document.getElementById('ws-dot').className = 'stat-dot ' + (ok ? 'ok' : 'err');
  const statusEl = document.getElementById('ws-status');
  statusEl.textContent = ok ? t('header.connected') : t('header.disconnected');
  statusEl.dataset.wsState = ok ? 'connected' : 'disconnected';
}
function wsSend(obj) {
  if (obj.action === 'subscribe') console.log('[DIAG] wsSend subscribe:', obj.instanceId);
  if (ws && ws.readyState === 1) ws.send(JSON.stringify(obj));
}

function handleWS(msg) {
  switch (msg.type) {
    case 'init':
      instances = {};
      (msg.instances||[]).forEach(i => instances[i.id] = i);
      renderGrid();
      updateStats();
      updateDocTitle();
      break;
    case 'instance_created':
      instances[msg.instance.id] = msg.instance;
      updateStats();
      renderGrid();
      openWindow(msg.instance.id);
      break;
    case 'instance_updated':
      if (instances[msg.instance.id]) {
        instances[msg.instance.id] = { ...instances[msg.instance.id], ...msg.instance };
      } else {
        instances[msg.instance.id] = msg.instance;
      }
      renderGrid();
      if (openWindows[msg.instance.id]) updateWindowHeader(msg.instance.id);
      updateStats();
      break;
    case 'instance_deleted':
      if (openWindows[msg.instanceId]) closeWindow(msg.instanceId);
      delete instances[msg.instanceId];
      renderGrid();
      updateStats();
      break;
    case 'pty_data': {
      const w = openWindows[msg.instanceId];
      if (w) {
        // 缓冲写入：合并同一帧内的多次 pty_data，一次性写入终端
        // 避免 TUI 重绘的中间态（部分清屏/光标跳转）可见
        if (!w._writeBuf) w._writeBuf = '';
        w._writeBuf += msg.data;
        if (!w._writeRaf) {
          w._writeRaf = requestAnimationFrame(() => {
            const buf = w._writeBuf;
            w._writeBuf = '';
            w._writeRaf = null;
            w.term.write(buf, () => { if (w.isAutoFollow()) w.term.scrollToBottom(); });
          });
        }
      }
      if (instances[msg.instanceId]) {
        instances[msg.instanceId].lastOutputAt = new Date().toISOString();
        const raw = instances[msg.instanceId]._rawOutput = (instances[msg.instanceId]._rawOutput || '') + msg.data;
        if (raw.length > 800) instances[msg.instanceId]._rawOutput = raw.slice(-800);
        const clean = instances[msg.instanceId]._rawOutput
          .replace(/\x1b\][^\x07\x1b]*(?:\x07|\x1b\\)/g, '')   // OSC 序列
          .replace(/\x1b\[[0-9;?]*[A-Za-z]/g, '')               // CSI 序列
          .replace(/\x1b[()][A-Z0-9]/g, '')                     // 字符集切换
          .replace(/\x1b[=>NOM78HDEFGP]/g, '')                  // 其他 ESC 序列
          .replace(/[\x00-\x08\x0b-\x1f\x7f]/g, '')             // 控制字符
          .replace(/[─━═│┃┌┐└┘├┤┬┴┼╔╗╚╝╠╣╦╩╬╭╮╯╰│╲╱▏▎▍▌▋▊▉█▀▄■□▪▫●○◆◇◈△▲▽▼◀▶]+/g, m => m.length > 3 ? '' : m)  // 长装饰线
          .replace(/\n{3,}/g, '\n\n');
        instances[msg.instanceId].lastOutput = clean.length > 300 ? clean.slice(-300) : clean;
        scheduleGridRefresh();
      }
      break;
    }
    case 'pty_replay': {
      const w = openWindows[msg.instanceId];
      if (w) {
        // 首次 replay（打开窗口时）正常处理，后续重复 replay 跳过
        if (w._replayDone) {
          console.log('[DIAG] skipping duplicate pty_replay');
          break;
        }
        w._replayDone = true;
        w.term.clear(); w.term.write(msg.data); w.startScrollGuard();
      }
      break;
    }
    case 'waiting_input':
      if (instances[msg.instanceId]) {
        instances[msg.instanceId].waitingInput = msg.waiting;
        instances[msg.instanceId].waitingInputSince = msg.waiting ? (instances[msg.instanceId].waitingInputSince || new Date().toISOString()) : null;
      }
      if (openWindows[msg.instanceId]) setWinInputBarWaiting(msg.instanceId, msg.waiting);
      renderGrid();
      updateDocTitle();
      break;
    case 'status_change':
      if (instances[msg.instanceId]) instances[msg.instanceId].status = msg.status;
      if (openWindows[msg.instanceId]) {
        updateWindowHeader(msg.instanceId);
        setWinInputBarWaiting(msg.instanceId, false);
      }
      renderGrid();
      updateStats();
      updateDocTitle();
      break;
    case 'task_queue_updated':
      if (openWindows[msg.instanceId]) renderTaskQueue(msg.instanceId, msg.tasks);
      break;
    case 'snapshot':
      instances[msg.instanceId] = msg.data;
      if (openWindows[msg.instanceId]) updateWindowHeader(msg.instanceId);
      break;
  }
}

/* ═══════════════════════════════════════════════════════
   Grid View
═══════════════════════════════════════════════════════ */
let _gridRefreshTimer = null;
function updateDocTitle() {
  const baseTitle = t('page.title');
  const waitingCount = Object.values(instances).filter(i => i.status === 'running' && i.waitingInput).length;
  document.title = waitingCount > 0
    ? t('doc.waiting', waitingCount) + baseTitle
    : baseTitle;
}

function scheduleGridRefresh() {
  if (_gridRefreshTimer) return;
  _gridRefreshTimer = setTimeout(() => { _gridRefreshTimer = null; renderGrid(); }, 1000);
}

function renderGrid() {
  const container = document.getElementById('grid-container');
  // 清除旧的视图类名，应用当前视图
  container.className = 'grid-container' + (viewMode !== 'card' ? ' view-' + viewMode : '');

  const allIds = Object.keys(instances).reverse();
  // 按 category 过滤
  const ids = activeCategory === 'all' ? allIds : allIds.filter(id => {
    const cat = instances[id]?.category || 'agent';
    return cat === activeCategory;
  });

  // 更新 tab 计数
  updateCategoryTabCounts();

  if (!ids.length) {
    const hint = activeCategory === 'all' ? '暂无实例<br/>点击上方「新建实例」开始' :
      activeCategory === 'terminal' ? '暂无终端实例' : '暂无 Agent 实例';
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">&#9633;</div><div>' + hint + '</div></div>';
    return;
  }

  if (viewMode === 'kanban') {
    renderKanban(container, ids);
  } else {
    container.innerHTML = ids.map(id => renderCard(instances[id])).join('');
  }

  bindGridEvents(container);
}

function updateCategoryTabCounts() {
  const all = Object.keys(instances);
  const agentCount = all.filter(id => (instances[id]?.category || 'agent') === 'agent').length;
  const termCount = all.filter(id => instances[id]?.category === 'terminal').length;
  const el = (id) => document.getElementById(id);
  if (el('tab-count-all')) el('tab-count-all').textContent = all.length;
  if (el('tab-count-agent')) el('tab-count-agent').textContent = agentCount;
  if (el('tab-count-terminal')) el('tab-count-terminal').textContent = termCount;
}

function renderKanban(container, ids) {
  const groups = { running: [], done: [], error: [], stopped: [] };
  const groupLabels = { running: t('status.running'), done: t('status.done'), error: t('status.error'), stopped: t('status.stopped') };
  ids.forEach(id => {
    const s = instances[id]?.status || 'stopped';
    (groups[s] || (groups[s] = [])).push(id);
  });
  container.innerHTML = Object.entries(groups)
    .filter(([, arr]) => arr.length > 0)
    .map(([status, arr]) =>
      '<div class="kanban-col">' +
        '<div class="kanban-col-title">' + (groupLabels[status] || status) +
          '<span class="kanban-count">' + arr.length + '</span>' +
        '</div>' +
        arr.map(id => renderCard(instances[id])).join('') +
      '</div>'
    ).join('');
}

function bindGridEvents(container) {
  container.querySelectorAll('.grid-card').forEach(el => {
    el.addEventListener('click', () => openWindow(el.dataset.id));
  });
  container.querySelectorAll('.card-remove-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      deleteInstance(btn.dataset.id);
    });
  });
  // 卡片内联输入：快捷按钮
  container.querySelectorAll('.card-quick-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      wsSend({ action: 'pty_input', instanceId: btn.dataset.id, data: btn.dataset.t });
    });
  });
  // 卡片内联输入：输入框和发送按钮
  container.querySelectorAll('.card-inline-send').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const field = container.querySelector('.card-inline-field[data-id="' + btn.dataset.id + '"]');
      if (field && field.value) {
        wsSend({ action: 'pty_input', instanceId: btn.dataset.id, data: field.value + '\r' });
        field.value = '';
      }
    });
  });
  container.querySelectorAll('.card-inline-field').forEach(field => {
    field.addEventListener('click', e => e.stopPropagation());
    field.addEventListener('keydown', e => {
      e.stopPropagation();
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (field.value) {
          wsSend({ action: 'pty_input', instanceId: field.dataset.id, data: field.value + '\r' });
          field.value = '';
        }
      }
    });
  });
  // 阻止内联输入区域整体的点击冒泡
  container.querySelectorAll('.card-inline-input').forEach(el => {
    el.addEventListener('click', e => e.stopPropagation());
  });
  // 终端重启按钮
  container.querySelectorAll('.card-restart-btn').forEach(btn => {
    btn.addEventListener('click', async e => {
      e.stopPropagation();
      try {
        const r = await fetch('/api/instances/' + btn.dataset.id + '/restart', { method: 'POST' });
        const j = await r.json();
        if (!r.ok) throw new Error(j.error);
        toast(t('toast.terminal_restarted'), 'success');
      } catch (err) { toast(t('toast.restart_failed') + err.message, 'error'); }
    });
  });
}

// 视图切换器
(function initViewSwitcher() {
  const switcher = document.getElementById('view-switcher');
  // 恢复上次选择
  const saved = localStorage.getItem('viewMode') || 'card';
  switcher.querySelectorAll('.view-mode-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.view === saved);
  });

  switcher.addEventListener('click', e => {
    const btn = e.target.closest('.view-mode-btn');
    if (!btn) return;
    viewMode = btn.dataset.view;
    localStorage.setItem('viewMode', viewMode);
    switcher.querySelectorAll('.view-mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid();
  });
})();

function renderCard(inst) {
  const isTerminal = inst.category === 'terminal';
  const labels = { running: t('status.running'), done: t('status.done'), error: t('status.error'), stopped: t('status.stopped') };
  let statusTag = '';
  if (!isTerminal && inst.waitingInput && inst.status === 'running') {
    const waitingMs = inst.waitingInputSince ? Date.now() - new Date(inst.waitingInputSince).getTime() : 0;
    const waitingText = waitingMs > 120000 ? t('status.waiting') + ' · ' + fmtDurationShort(waitingMs) : t('status.waiting');
    statusTag = '<span class="card-status-tag tag-waiting">' + waitingText + '</span>';
  } else if (inst.status === 'running' && inst.lastOutputAt) {
    const idleMs = Date.now() - new Date(inst.lastOutputAt).getTime();
    if (idleMs > 30000 && !isTerminal) {
      statusTag = '<span class="card-status-tag tag-idle">' + t('status.idle') + '</span>';
    }
  }
  const elapsed = inst.finishedAt
    ? fmtDuration(new Date(inst.startedAt), new Date(inst.finishedAt))
    : fmtElapsed(new Date(inst.startedAt));
  const preview = inst.lastOutput
    ? esc(inst.lastOutput.trim().split('\n').slice(-3).join('\n'))
    : '<span style="color:var(--text3);font-style:italic">' + t('status.no_output') + '</span>';
  const catClass = isTerminal ? ' category-terminal' : '';
  return '<div class="grid-card status-' + inst.status + catClass + '" data-id="' + inst.id + '">' +
    '<div class="card-row1">' +
      '<span class="inst-badge badge-' + inst.status + '">' + (labels[inst.status]||inst.status) + '</span>' +
      (isTerminal
        ? '<span class="inst-badge shell-badge">' + esc(inst.shellCmd || 'shell') + '</span>'
        : '<span class="cli-badge">' + esc((CLI_CONFIGS[inst.cliType] || CLI_CONFIGS.claude).label) + '</span>') +
      (isTerminal && inst.shellPort ? '<span class="port-badge">:' + esc(inst.shellPort) + '</span>' : '') +
      (!isTerminal && inst.gitBranch ? '<span class="git-branch-badge" title="' + esc(inst.gitBranch) + '">' + esc(inst.gitBranch) + '</span>' : '') +
      (!isTerminal && inst.worktree && inst.worktree.enabled ? '<span class="worktree-indicator">WT</span>' : '') +
      (!isTerminal && inst.role === 'orchestrator' ? '<span class="orchestrator-badge">ORCH</span>' : '') +
      '<span class="card-label">' + esc(inst.label||inst.id) + '</span>' +
      statusTag +
    '</div>' +
    (isTerminal ? '' : '<div class="card-prompt">' + esc(inst.prompt) + '</div>') +
    '<div class="card-output">' + preview + '</div>' +
    (!isTerminal && inst.waitingInput && inst.status === 'running'
      ? '<div class="card-inline-input" data-id="' + inst.id + '">' +
          '<button class="card-quick-btn" data-id="' + inst.id + '" data-t="y\r">y</button>' +
          '<button class="card-quick-btn" data-id="' + inst.id + '" data-t="n\r">n</button>' +
          '<button class="card-quick-btn" data-id="' + inst.id + '" data-t="\r">Enter</button>' +
          '<button class="card-quick-btn" data-id="' + inst.id + '" data-t="\x03">Ctrl+C</button>' +
          '<input class="card-inline-field" data-id="' + inst.id + '" placeholder="' + t('card.reply_placeholder') + '" />' +
          '<button class="card-inline-send" data-id="' + inst.id + '">' + t('card.send') + '</button>' +
        '</div>'
      : '') +
    '<div class="card-footer">' +
      '<span class="card-time">' + elapsed + '</span>' +
      (isTerminal && inst.status !== 'running'
        ? '<button class="card-restart-btn" data-id="' + inst.id + '" title="' + t('card.restart_title') + '">' + t('card.restart') + '</button>'
        : '') +
      (inst.status !== 'running'
        ? '<button class="card-remove-btn" data-id="' + inst.id + '" title="' + t('card.remove_title') + '">' + t('card.remove') + '</button>'
        : '') +
    '</div>' +
  '</div>';
}

/* ═══════════════════════════════════════════════════════
   Floating Window System
═══════════════════════════════════════════════════════ */
function openWindow(id) {
  if (openWindows[id]) { bringToFront(id); return; }
  const inst = instances[id];
  if (!inst) return;
  // 立即占位，防止快速连续调用产生竞态
  openWindows[id] = true;

  // 级联位置
  const offset = (_winCounter++ % 8) * 28;
  const layer = document.getElementById('win-layer');
  const lw = layer.offsetWidth || 900;
  const lh = layer.offsetHeight || 600;
  const w = Math.min(720, lw - 40);
  const h = Math.min(700, lh - 40);
  const x = Math.min(60 + offset, lw - w - 10);
  const y = Math.min(30 + offset, lh - h - 10);

  const el = document.createElement('div');
  el.className = 'float-win';
  el.dataset.id = id;
  el.style.cssText = 'left:' + x + 'px;top:' + y + 'px;width:' + w + 'px;height:' + h + 'px;';
  el.innerHTML =
    '<div class="win-header">' +
      '<button class="mobile-back-btn win-mobile-back" title="' + t('win.back_title') + '">&larr;</button>' +
      '<div class="win-dot ' + (inst.status||'') + '"></div>' +
      '<div class="win-title">' + esc(inst.label||inst.id) + '</div>' +
      '<span class="cli-badge">' + esc((CLI_CONFIGS[inst.cliType] || CLI_CONFIGS.claude).label) + '</span>' +
      (inst.gitBranch ? '<span class="git-branch-badge">' + esc(inst.gitBranch) + '</span>' : '') +
      (inst.worktree && inst.worktree.enabled ? '<span class="worktree-indicator">WT</span>' : '') +
      '<div class="win-meta"></div>' +
      '<div class="win-actions">' +
        (inst.worktree && inst.worktree.enabled
          ? '<button class="btn win-merge-btn" style="padding:3px 8px;font-size:11px;" title="' + t('win.merge_title', esc(inst.worktree.baseBranch)) + '">Merge</button>' +
            '<button class="btn win-push-btn" style="padding:3px 8px;font-size:11px;" title="' + t('win.push_title') + '">Push</button>'
          : '') +
        (inst.category !== 'terminal' ? '<button class="win-queue-toggle" title="' + t('win.queue_title') + '">&#9776;</button>' : '') +
        (inst.category === 'terminal' ? '<button class="btn win-restart-btn" style="padding:3px 8px;font-size:11px;color:var(--blue);border-color:#c0d4e8;">' + t('win.restart') + '</button>' : '') +
        '<button class="btn btn-stop win-stop-btn" style="padding:3px 8px;font-size:11px;">' + t('win.stop') + '</button>' +
        '<button class="win-close" title="' + t('win.close_title') + '">&#215;</button>' +
      '</div>' +
    '</div>' +
    '<div class="win-content-area">' +
      '<div class="win-body-col">' +
        '<div class="win-body">' +
          '<div class="terminal-wrap"><button class="scroll-bottom-btn" title="' + t('win.scroll_bottom') + '">&#8595;</button></div>' +
        '</div>' +
        '<div class="input-bar">' +
          '<span class="input-waiting-label">' + t('win.waiting_input') + '</span>' +
          '<div class="quick-btns">' +
            '<button class="quick-btn win-q" data-t="y\r">y</button>' +
            '<button class="quick-btn win-q" data-t="n\r">n</button>' +
            '<button class="quick-btn win-q" data-t="\r">Enter</button>' +
            '<button class="quick-btn win-q" data-t="\x03">Ctrl+C</button>' +
          '</div>' +
          '<input class="input-field" placeholder="' + t('win.input_placeholder', esc((CLI_CONFIGS[inst.cliType] || CLI_CONFIGS.claude).label)) + '" />' +
          '<button class="btn-send">' + t('win.send') + '</button>' +
        '</div>' +
      '</div>' +
      '<div class="task-queue-panel">' +
        '<div class="tq-header">' +
          '<span class="tq-header-title">' + t('win.tq_title') + '</span>' +
        '</div>' +
        '<div class="tq-list"><div class="tq-empty">' + t('win.tq_empty') + '</div></div>' +
        '<div class="tq-add-form">' +
          '<textarea class="tq-add-textarea" placeholder="' + t('win.tq_placeholder') + '"></textarea>' +
          '<div class="tq-add-row">' +
            '<input class="tq-add-pos" type="number" min="0" placeholder="" title="' + t('win.tq_pos_title') + '" />' +
            '<label class="tq-file-label">' + t('win.tq_attach') + '<input type="file" accept="image/*" style="display:none" class="tq-add-file" /></label>' +
            '<button class="tq-add-btn">' + t('win.tq_add') + '</button>' +
          '</div>' +
        '</div>' +
        '<div class="tq-actions">' +
          '<button class="tq-send-all-btn">' + t('win.tq_send_all') + '</button>' +
        '</div>' +
      '</div>' +
    '</div>' +
    '<div class="win-resize-edge edge-n" data-dir="n"></div>' +
    '<div class="win-resize-edge edge-s" data-dir="s"></div>' +
    '<div class="win-resize-edge edge-w" data-dir="w"></div>' +
    '<div class="win-resize-edge edge-e" data-dir="e"></div>' +
    '<div class="win-resize-edge edge-nw" data-dir="nw"></div>' +
    '<div class="win-resize-edge edge-ne" data-dir="ne"></div>' +
    '<div class="win-resize-edge edge-sw" data-dir="sw"></div>' +
    '<div class="win-resize-edge edge-se" data-dir="se"></div>';
  layer.appendChild(el);

  // 创建 Terminal
  const termWrap = el.querySelector('.terminal-wrap');
  const termInstance = new Terminal({
    theme: TERM_THEME,
    fontFamily: "'IBM Plex Mono', 'Menlo', monospace",
    fontSize: 13, lineHeight: 1.5, cursorBlink: true,
    scrollback: 5000, allowTransparency: false,
  });
  const fa = new FitAddon.FitAddon();
  termInstance.loadAddon(fa);
  termInstance.open(termWrap);

  // ── 自动跟随底部 + 回到底部按钮 ──
  // 自动跟随：只在新数据到来时滚到底部，不持续强制。
  // 用户向上滚动时脱离跟随，发送输入时重新跟随。
  const scrollBottomBtn = termWrap.querySelector('.scroll-bottom-btn');
  const _xvp = termWrap.querySelector('.xterm-viewport');
  let _autoFollow = true;

  if (_xvp) {
    // 用户鼠标向上滚动 -> 脱离跟随
    termWrap.addEventListener('wheel', (e) => {
      if (e.deltaY < 0) _autoFollow = false;
    }, { capture: true });
    // 更新回到底部按钮 + 滚到底部时自动重新跟随
    _xvp.addEventListener('scroll', () => {
      const atBottom = _xvp.scrollTop >= _xvp.scrollHeight - _xvp.clientHeight - 30;
      scrollBottomBtn.classList.toggle('visible', !atBottom);
      if (atBottom) _autoFollow = true;
    });
  }

  scrollBottomBtn.addEventListener('click', () => {
    _autoFollow = true;
    termInstance.scrollToBottom();
  });

  function startScrollGuard() { _autoFollow = true; termInstance.scrollToBottom(); }

  // buffer 切换 / resize 等系统事件：仅在已经处于跟随模式时滚到底部，不强制启用
  termInstance.buffer.onBufferChange(() => {
    if (_autoFollow) termInstance.scrollToBottom();
  });

  // fit 后再订阅，确保 replay 时终端尺寸正确
  const doFit = () => {
    try {
      fa.fit();
      wsSend({ action: 'pty_resize', instanceId: id, cols: termInstance.cols, rows: termInstance.rows });
    } catch(_) {}
  };
  setTimeout(() => {
    doFit();
    console.log('[DIAG] sending subscribe for', id, new Error().stack);
    wsSend({ action: 'subscribe', instanceId: id });
  }, 80);
  setTimeout(doFit, 400);
  setTimeout(doFit, 900);

  // 终端输入 -> PTY
  termInstance.onData(data => {
    if (selectedId === id) wsSend({ action: 'pty_input', instanceId: id, data });
  });

  // ResizeObserver（防抖）
  let _fitTimer = null;
  const ro = new ResizeObserver(() => {
    if (_fitTimer) clearTimeout(_fitTimer);
    _fitTimer = setTimeout(() => {
      const prevCols = termInstance.cols, prevRows = termInstance.rows;
      try { fa.fit(); } catch(_) {}
      if (termInstance.cols !== prevCols || termInstance.rows !== prevRows) {
        console.log('[DIAG] fit() resized: ' + prevCols + 'x' + prevRows + ' -> ' + termInstance.cols + 'x' + termInstance.rows);
        wsSend({ action: 'pty_resize', instanceId: id, cols: termInstance.cols, rows: termInstance.rows });
      }
      if (_autoFollow) termInstance.scrollToBottom();
    }, 100);
  });
  ro.observe(termWrap);

  // 存储
  openWindows[id] = { el, term: termInstance, fitAddon: fa, resizeObserver: ro, startScrollGuard, isAutoFollow: () => _autoFollow };

  // 事件绑定
  el.addEventListener('mousedown', () => bringToFront(id));

  // 拖动
  const header = el.querySelector('.win-header');
  header.addEventListener('mousedown', e => {
    if (e.target.closest('button') || e.target.closest('input')) return;
    startDrag(el, e);
  });

  // 双击标题重命名
  const titleEl = el.querySelector('.win-title');
  titleEl.addEventListener('dblclick', e => {
    e.stopPropagation();
    const current = instances[id]?.label || id;
    const input = document.createElement('input');
    input.type = 'text';
    input.value = current;
    input.style.cssText = 'font-size:13px;font-weight:600;border:1px solid var(--accent);border-radius:3px;padding:1px 4px;background:var(--bg);color:var(--text);width:100%;outline:none;';
    titleEl.textContent = '';
    titleEl.appendChild(input);
    input.focus();
    input.select();
    function commit() {
      const val = input.value.trim();
      const newLabel = val || current;
      titleEl.textContent = newLabel;
      if (val && val !== current) {
        if (instances[id]) { instances[id].label = newLabel; }
        renderGrid();
        fetch('/api/instances/' + id, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ label: val }),
        });
      }
    }
    input.addEventListener('blur', commit);
    input.addEventListener('keydown', e2 => {
      if (e2.key === 'Enter') { e2.preventDefault(); input.blur(); }
      if (e2.key === 'Escape') { input.value = current; input.blur(); }
    });
  });

  // 缩放（8 个方向）
  el.querySelectorAll('.win-resize-edge').forEach(edge => {
    edge.addEventListener('mousedown', e => startResize(el, id, e, edge.dataset.dir));
  });

  // 关闭
  el.querySelector('.win-close').addEventListener('click', e => { e.stopPropagation(); closeWindow(id); });

  // 移动端返回按钮
  el.querySelector('.win-mobile-back').addEventListener('click', e => { e.stopPropagation(); closeWindow(id); });

  // 停止
  el.querySelector('.win-stop-btn').addEventListener('click', e => { e.stopPropagation(); stopInstance(id); });

  // 重启（终端实���）
  const restartBtn = el.querySelector('.win-restart-btn');
  if (restartBtn) {
    restartBtn.addEventListener('click', async e => {
      e.stopPropagation();
      try {
        const r = await fetch('/api/instances/' + id + '/restart', { method: 'POST' });
        const j = await r.json();
        if (!r.ok) throw new Error(j.error);
        toast(t('toast.terminal_restarted'), 'success');
      } catch (err) { toast(t('toast.restart_failed') + err.message, 'error'); }
    });
  }

  // Merge 按钮
  const mergeBtn = el.querySelector('.win-merge-btn');
  if (mergeBtn) {
    mergeBtn.addEventListener('click', async e => {
      e.stopPropagation();
      mergeBtn.disabled = true;
      mergeBtn.textContent = 'Merging...';
      try {
        const r = await fetch('/api/instances/' + id + '/git-merge', { method: 'POST' });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || t('toast.merge_failed'));
        if (data.conflicts && data.conflicts.length) {
          showMergeConflictDialog(id, data.conflicts);
        } else if (data.success) {
          toast(t('toast.merge_success'));
        } else {
          toast(t('toast.merge_failed') + (data.error || 'unknown error'), 'error');
        }
      } catch(err) { toast(err.message, 'error'); }
      finally { mergeBtn.disabled = false; mergeBtn.textContent = 'Merge'; }
    });
  }

  // Push 按钮
  const pushBtn = el.querySelector('.win-push-btn');
  if (pushBtn) {
    pushBtn.addEventListener('click', async e => {
      e.stopPropagation();
      pushBtn.disabled = true;
      pushBtn.textContent = 'Pushing...';
      try {
        const r = await fetch('/api/instances/' + id + '/git-push', { method: 'POST' });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || t('toast.push_success'));
        toast(t('toast.push_success'));
      } catch(err) { toast(err.message, 'error'); }
      finally { pushBtn.disabled = false; pushBtn.textContent = 'Push'; }
    });
  }

  // 快捷按钮
  // 聚焦终端但不触发浏览器滚动
  function focusTermNoScroll() {
    const ta = openWindows[id]?.term?.textarea;
    if (ta) ta.focus({ preventScroll: true });
  }

  el.querySelectorAll('.win-q').forEach(btn => {
    btn.addEventListener('click', () => {
      wsSend({ action: 'pty_input', instanceId: id, data: btn.dataset.t });
      openWindows[id]?.startScrollGuard();
      focusTermNoScroll();
    });
  });

  // 输入框
  const field = el.querySelector('.input-field');
  const sendBtn = el.querySelector('.btn-send');
  function doSend() {
    const text = field.value;
    if (!text) return;
    wsSend({ action: 'pty_input', instanceId: id, data: text + '\r' });
    field.value = '';
    openWindows[id]?.startScrollGuard();
    focusTermNoScroll();
  }
  sendBtn.addEventListener('click', doSend);
  field.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); }
  });

  // 任务队列面板
  const queueToggle = el.querySelector('.win-queue-toggle');
  const queuePanel = el.querySelector('.task-queue-panel');
  queueToggle.addEventListener('click', e => {
    e.stopPropagation();
    const isOpen = queuePanel.classList.toggle('open');
    queueToggle.classList.toggle('active', isOpen);
    if (isOpen) loadTaskQueue(id);
    setTimeout(() => { try { fa.fit(); if (_autoFollow) termInstance.scrollToBottom(); } catch(_) {} }, 50);
  });

  // 添加任务
  const tqTextarea = el.querySelector('.tq-add-textarea');
  const tqPos = el.querySelector('.tq-add-pos');
  const tqFile = el.querySelector('.tq-add-file');
  const tqAddBtn = el.querySelector('.tq-add-btn');
  const tqFileLabel = el.querySelector('.tq-file-label');

  tqFile.addEventListener('change', () => {
    tqFileLabel.textContent = tqFile.files[0] ? tqFile.files[0].name : t('win.tq_attach');
  });

  tqAddBtn.addEventListener('click', async () => {
    const text = tqTextarea.value.trim();
    if (!text) { toast(t('toast.task_empty'), 'error'); return; }
    const pos = tqPos.value.trim();
    const file = tqFile.files[0];

    const formData = new FormData();
    formData.append('text', text);
    if (pos !== '') formData.append('position', pos);
    if (file) formData.append('image', file);

    try {
      const r = await fetch('/api/instances/' + id + '/tasks', { method: 'POST', body: formData });
      const j = await r.json();
      if (!r.ok) throw new Error(j.error);
      tqTextarea.value = '';
      tqPos.value = '';
      tqFile.value = '';
      tqFileLabel.textContent = t('win.tq_attach');
    } catch(e) { toast(t('toast.add_failed') + e.message, 'error'); }
  });

  // Enter 添加任务，Cmd/Ctrl+Enter 换行
  tqTextarea.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.metaKey && !e.ctrlKey && !e.shiftKey) {
      e.preventDefault();
      tqAddBtn.click();
    }
  });

  // 发送全部
  el.querySelector('.tq-send-all-btn').addEventListener('click', async () => {
    try {
      const r = await fetch('/api/instances/' + id + '/tasks/send-all', { method: 'POST' });
      const j = await r.json();
      if (!r.ok) throw new Error(j.error);
      toast(t('toast.send_all', j.pendingCount), 'success');
    } catch(e) { toast(e.message, 'error'); }
  });

  bringToFront(id);
  updateWindowHeader(id);
  setWinInputBarWaiting(id, inst.waitingInput || false);
}

function closeWindow(id) {
  const w = openWindows[id];
  if (!w) return;
  w.term.dispose();
  w.resizeObserver.disconnect();
  wsSend({ action: 'unsubscribe', instanceId: id });
  w.el.remove();
  delete openWindows[id];
  if (selectedId === id) selectedId = null;
}

// ── 任务队列 ──────────────────────────────────────────────────────────────────
async function loadTaskQueue(id) {
  try {
    const r = await fetch('/api/instances/' + id + '/tasks');
    const tasks = await r.json();
    if (!r.ok) throw new Error(tasks.error);
    renderTaskQueue(id, tasks);
  } catch(e) { console.error('加载任务队列失败:', e); }
}

function renderTaskQueue(id, tasks) {
  const w = openWindows[id];
  if (!w) return;
  const list = w.el.querySelector('.tq-list');
  if (!list) return;

  // 更新 badge
  const badge = w.el.querySelector('.win-queue-badge');
  const pending = tasks.filter(t => t.status === 'pending').length;
  const toggle = w.el.querySelector('.win-queue-toggle');
  if (pending > 0) {
    if (badge) {
      badge.textContent = pending;
    } else {
      const b = document.createElement('span');
      b.className = 'win-queue-badge';
      b.textContent = pending;
      toggle.appendChild(b);
    }
  } else if (badge) {
    badge.remove();
  }

  if (tasks.length === 0) {
    list.innerHTML = '<div class="tq-empty">暂无任务</div>';
    return;
  }

  list.innerHTML = tasks.map((task, i) => {
    const statusClass = task.status === 'sent' ? ' sent' : task.status === 'sending' ? ' sending' : '';
    const statusLabel = task.status === 'sent' ? ' (已发送)' : task.status === 'sending' ? ' (发送中)' : '';
    return '<div class="tq-item' + statusClass + '" data-task-id="' + task.id + '" data-status="' + task.status + '">' +
      '<div class="tq-item-index">#' + (i + 1) + statusLabel + '</div>' +
      '<div class="tq-item-text" title="点击编辑">' + esc(task.text) + '</div>' +
      (task.imageName ? '<div class="tq-item-image">附图: ' + esc(task.imageName) + '</div>' : '') +
      '<div class="tq-item-actions">' +
        (task.status === 'pending' ? '<button class="tq-item-btn send-btn" data-action="send">发送</button>' : '') +
        (task.status !== 'sent' ? '<button class="tq-item-btn" data-action="insert-before">前插</button>' : '') +
        '<button class="tq-item-btn del-btn" data-action="delete">删除</button>' +
      '</div>' +
    '</div>';
  }).join('');

  // 点击文本进入编辑模式
  list.querySelectorAll('.tq-item-text').forEach(textEl => {
    textEl.addEventListener('click', (e) => {
      e.stopPropagation();
      const itemEl = textEl.closest('.tq-item');
      if (itemEl.dataset.status !== 'pending') return;
      if (textEl.querySelector('textarea')) return; // 已在编辑
      const originalText = textEl.textContent;
      const taskId = itemEl.dataset.taskId;
      textEl.innerHTML =
        '<textarea class="tq-item-edit">' + esc(originalText) + '</textarea>' +
        '<div class="tq-edit-actions">' +
          '<button class="tq-save-btn">保存</button>' +
          '<button class="tq-cancel-btn">取消</button>' +
        '</div>';
      const textarea = textEl.querySelector('textarea');
      textarea.focus();
      textarea.selectionStart = textarea.value.length;

      textEl.querySelector('.tq-cancel-btn').addEventListener('click', (ev) => {
        ev.stopPropagation();
        textEl.textContent = originalText;
      });
      textEl.querySelector('.tq-save-btn').addEventListener('click', async (ev) => {
        ev.stopPropagation();
        const newText = textarea.value.trim();
        if (!newText) { toast(t('toast.task_empty'), 'error'); return; }
        if (newText === originalText) { textEl.textContent = originalText; return; }
        try {
          const r = await fetch('/api/instances/' + id + '/tasks/' + taskId, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: newText }),
          });
          const j = await r.json();
          if (!r.ok) throw new Error(j.error);
        } catch(err) { toast(t('toast.settings_failed') + err.message, 'error'); textEl.textContent = originalText; }
      });
    });
  });

  // 绑定按钮事件
  list.querySelectorAll('.tq-item-btn').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const taskEl = btn.closest('.tq-item');
      const taskId = taskEl.dataset.taskId;
      const action = btn.dataset.action;

      if (action === 'send') {
        try {
          const r = await fetch('/api/instances/' + id + '/tasks/' + taskId + '/send', { method: 'POST' });
          const j = await r.json();
          if (!r.ok) throw new Error(j.error);
        } catch(e) { toast(e.message, 'error'); }
      } else if (action === 'delete') {
        try {
          const r = await fetch('/api/instances/' + id + '/tasks/' + taskId, { method: 'DELETE' });
          const j = await r.json();
          if (!r.ok) throw new Error(j.error);
        } catch(e) { toast(e.message, 'error'); }
      } else if (action === 'insert-before') {
        const idx = [...list.querySelectorAll('.tq-item')].indexOf(taskEl);
        const posInput = w.el.querySelector('.tq-add-pos');
        if (posInput) posInput.value = idx;
        w.el.querySelector('.tq-add-textarea')?.focus();
      }
    });
  });
}

function bringToFront(id) {
  topZIndex++;
  const w = openWindows[id];
  if (!w) return;
  Object.values(openWindows).forEach(v => v.el.classList.remove('focused'));
  w.el.style.zIndex = topZIndex;
  w.el.classList.add('focused');

function updateWindowHeader(id) {
  const w = openWindows[id];
  const inst = instances[id];
  if (!w || !inst) return;
  w.el.querySelector('.win-dot').className = 'win-dot ' + (inst.status || '');
  const titleEl = w.el.querySelector('.win-title');
  // 正在编辑标题时（内含 input），跳过标题更新，避免打断用户输入
  if (!titleEl.querySelector('input')) {
    titleEl.textContent = inst.label || inst.id;
  }
  const elapsed = inst.finishedAt
    ? fmtDuration(new Date(inst.startedAt), new Date(inst.finishedAt))
    : fmtElapsed(new Date(inst.startedAt));

function setWinInputBarWaiting(id, waiting) {

/* ═══════════════════════════════════════════════════════
   Drag & Resize
═══════════════════════════════════════════════════════ */
function startDrag(el, e) {
  e.preventDefault();
  const startX = e.clientX - el.offsetLeft;
  const startY = e.clientY - el.offsetTop;
  function onMove(ev) {
    el.style.left = Math.max(0, ev.clientX - startX) + 'px';
    el.style.top  = Math.max(0, ev.clientY - startY) + 'px';
  }
  function onUp() {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function startResize(el, id, e, dir) {
  e.preventDefault();
  e.stopPropagation();
  const startX = e.clientX, startY = e.clientY;
  const startW = el.offsetWidth, startH = el.offsetHeight;
  const startL = el.offsetLeft, startT = el.offsetTop;
  const minW = 480, minH = 320;

  function onMove(ev) {
    const dx = ev.clientX - startX;
    const dy = ev.clientY - startY;

    if (dir.includes('e')) {
      el.style.width = Math.max(minW, startW + dx) + 'px';
    }
    if (dir.includes('s')) {
      el.style.height = Math.max(minH, startH + dy) + 'px';
    }
    if (dir.includes('w')) {
      const newW = Math.max(minW, startW - dx);
      el.style.width = newW + 'px';
      el.style.left = (startL + startW - newW) + 'px';
    }
    if (dir.includes('n')) {
      const newH = Math.max(minH, startH - dy);
      el.style.height = newH + 'px';
      el.style.top = (startT + startH - newH) + 'px';
    }
  }
  function onUp() {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    const w = openWindows[id];
    if (w) { try { w.fitAddon.fit(); } catch(_) {} }
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function showWorktreeCleanupDialog(id) {
  const inst = instances[id];
  if (!inst) return;
  const branch = (inst.worktree && inst.worktree.branch) || '?';
  const overlay = document.createElement('div');
  overlay.className = 'wt-cleanup-overlay';
  overlay.innerHTML =
    '<div class="wt-cleanup-dialog">' +
      '<div class="wt-cleanup-title">' + t('worktree.title') + esc(inst.label || inst.id) + '</div>' +
      '<p style="font-size:12px;color:var(--text2);margin-bottom:16px;">' + t('worktree.branch') + ' ' + esc(branch) + '</p>' +
      '<button class="cleanup-option" data-action="keep">' +
        '<div class="cleanup-option-title">' + t('worktree.keep_title') + '</div>' +
        '<div class="cleanup-option-desc">' + t('worktree.keep_desc') + '</div>' +
      '</button>' +
      '<button class="cleanup-option" data-action="remove-worktree">' +
        '<div class="cleanup-option-title">' + t('worktree.rm_wt_title') + '</div>' +
        '<div class="cleanup-option-desc">' + t('worktree.rm_wt_desc') + '</div>' +
      '</button>' +
      '<button class="cleanup-option" data-action="remove-all">' +
        '<div class="cleanup-option-title">' + t('worktree.rm_all_title') + '</div>' +
        '<div class="cleanup-option-desc">' + t('worktree.rm_all_desc') + '</div>' +
      '</button>' +
      '<button class="btn" style="margin-top:12px;width:100%;text-align:center;" data-action="cancel">' + t('worktree.cancel') + '</button>' +
    '</div>';
  document.body.appendChild(overlay);

  overlay.addEventListener('click', async e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const action = btn.dataset.action;
    if (action === 'cancel') { overlay.remove(); return; }
    // 禁用所有按钮
    overlay.querySelectorAll('button').forEach(b => b.disabled = true);
    try {
      // 先调用清理 API
      const cr = await fetch('/api/instances/' + id + '/cleanup-worktree', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: action })
      });
      const cd = await cr.json();
      if (!cr.ok) throw new Error(cd.error || t('cleanup.failed'));
      // 再删除实例
      const dr = await fetch('/api/instances/' + id, { method: 'DELETE' });
      if (!dr.ok) throw new Error((await dr.json()).error);
      closeWindow(id);
      toast(t('toast.deleted_msg', cd.message));
    } catch(err) {
      toast(err.message, 'error');
    }
    overlay.remove();
  });
}

function showMergeConflictDialog(id, files) {
  const inst = instances[id];
  if (!inst) return;
  const overlay = document.createElement('div');
  overlay.className = 'wt-cleanup-overlay';
  overlay.innerHTML =
    '<div class="wt-cleanup-dialog">' +
      '<div class="wt-cleanup-title">' + t('merge.title') + '</div>' +
      '<p style="font-size:12px;color:var(--text2);margin-bottom:8px;">' + t('merge.desc') + '</p>' +
      '<div class="conflict-file-list">' +
        files.map(f => '<div>' + esc(f) + '</div>').join('') +
      '</div>' +
      '<button class="cleanup-option" data-action="manual">' +
        '<div class="cleanup-option-title">' + t('merge.manual_title') + '</div>' +
        '<div class="cleanup-option-desc">' + t('merge.manual_desc') + '</div>' +
      '</button>' +
      '<button class="cleanup-option" data-action="auto">' +
        '<div class="cleanup-option-title">' + t('merge.auto_title') + '</div>' +
        '<div class="cleanup-option-desc">' + t('merge.auto_desc') + '</div>' +
      '</button>' +
      '<button class="btn" style="margin-top:12px;width:100%;text-align:center;" data-action="cancel">' + t('merge.close') + '</button>' +
    '</div>';
  document.body.appendChild(overlay);

  overlay.addEventListener('click', e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const action = btn.dataset.action;
    if (action === 'cancel' || action === 'manual') {
      overlay.remove();
      if (action === 'manual') toast(t('toast.resolve_conflict'));
      return;
    }
    if (action === 'auto') {
      overlay.remove();
      // 打开新建 Modal，预填冲突解决 prompt
      const conflictPrompt = t('merge.conflict_prompt') + files.join('\n');
      document.getElementById('modal-overlay').classList.remove('hidden');
      const promptField = document.getElementById('inst-prompt');
      if (promptField) promptField.value = conflictPrompt;
      // 预填目录为 worktree 路径
      if (inst.worktree && inst.worktree.worktreePath) {
        const dirField = document.getElementById('inst-dir');
        if (dirField) dirField.value = inst.worktree.worktreePath;
      }
    }
  });
}

/* ═══════════════════════════════════════════════════════
   Image paste (global, targets focused window)
═══════════════════════════════════════════════════════ */
document.addEventListener('paste', e => {
  if (!selectedId || !openWindows[selectedId]) return;
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      const file = item.getAsFile();
      if (!file) continue;
      const ext = item.type.split('/')[1] || 'png';
      const named = new File([file], 'paste_' + Date.now() + '.' + ext, { type: item.type });
      uploadImageForWindow(selectedId, named, '');
      break;
    }
  }
});

async function uploadImageForWindow(id, file, caption) {
  const formData = new FormData();
  formData.append('image', file);
  formData.append('instanceId', id);
  try {
    toast(t('toast.uploading'));
    const r = await fetch('/api/upload-image', { method: 'POST', body: formData });
    const j = await r.json();
    if (!r.ok) throw new Error(j.error);
    const msg = caption
      ? caption + ' (截图已保存为 ' + j.filename + '，请查看)'
      : '我上传了一张截图，文件名是 ' + j.filename + '，请查看并根据截图中的内容给出建议。';
    wsSend({ action: 'pty_input', instanceId: id, data: msg + '\n' });
    toast(t('toast.upload_success'), 'success');
  } catch(e) { toast(t('toast.upload_failed') + e.message, 'error'); }
}

let cliStatus = {};
let selectedCliType = "claude";

async function loadCliStatus() {
  try {
    const r = await fetch('/api/cli-status');
    cliStatus = await r.json();
  } catch (_) {}
  const container = document.getElementById('cli-type-selector');
  container.innerHTML = '';
  const order = ['claude', 'codex', 'gemini'];
  let hasActive = false;
  order.forEach(key => {
    const info = cliStatus[key];
    if (!info) return;
    const btn = document.createElement('button');
    btn.className = 'cli-type-btn';
    btn.textContent = info.label;
    btn.dataset.cli = key;
    if (!info.available) {
      btn.disabled = true;
      btn.title = info.label + ' 未安装';
    }
    btn.addEventListener('click', () => {
      if (btn.disabled) return;
      container.querySelectorAll('.cli-type-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedCliType = key;
      document.getElementById('f-prompt').placeholder = '请输入你想让 ' + info.label + ' 执行的任务...';
    });
    container.appendChild(btn);
    if (!hasActive && info.available) {
      btn.classList.add('active');
      selectedCliType = key;
      hasActive = true;
    }
  });
}
loadCliStatus();

// 收集高级参数为数组
function collectCliArgs() {
  const args = [];
  const model = document.getElementById('f-arg-model').value.trim();
  if (model) { args.push('--model', model); }
  const permMode = document.getElementById('f-arg-permission-mode').value;
  if (permMode) { args.push('--permission-mode', permMode); }
  const effort = document.getElementById('f-arg-effort').value;
  if (effort) { args.push('--effort', effort); }
  const addDir = document.getElementById('f-arg-add-dir').value.trim();
  if (addDir) { args.push('--add-dir'); addDir.split(/\s+/).forEach(d => args.push(d)); }
  const allowedTools = document.getElementById('f-arg-allowed-tools').value.trim();
  if (allowedTools) { args.push('--allowedTools', allowedTools); }
  const disallowedTools = document.getElementById('f-arg-disallowed-tools').value.trim();
  if (disallowedTools) { args.push('--disallowedTools', disallowedTools); }
  const sysPrompt = document.getElementById('f-arg-system-prompt').value.trim();
  if (sysPrompt) { args.push('--append-system-prompt', sysPrompt); }
  // 常用开关
  document.querySelectorAll('#cli-args-chips .cli-args-chip.active').forEach(chip => {
    args.push(chip.dataset.arg);
  });
  // 自定义参数（按 shell 风格拆分）
  const custom = document.getElementById('f-arg-custom').value.trim();
  if (custom) {
    // 简单拆分，支持引号
    const parts = custom.match(/"[^"]*"|'[^']*'|\S+/g) || [];
    parts.forEach(p => args.push(p.replace(/^["']|["']$/g, '')));
  }
  return args;
}

document.getElementById('btn-create').addEventListener('click', async () => {
  // 终端模式
  if (modalMode === 'terminal') {
    const cmd = document.getElementById('ft-cmd').value;
    const cwd = ftDirSelectedPath || document.getElementById('ft-cwd').value.trim();
    const label = document.getElementById('ft-label').value.trim();
    const port = document.getElementById('ft-port').value.trim();
    if (!cwd) { toast(t('toast.no_cwd'), 'error'); return; }
    try {
      const payload = { cmd, cwd, label: label || cmd, port: port || undefined };
      const r = await fetch('/api/terminal-instances', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const j = await r.json();
      if (!r.ok) throw new Error(j.error);
      toast(t('toast.terminal_started'), 'success');
      closeModal();
    } catch (e) { toast(e.message, 'error'); }
    return;
  }

  // Agent 模式
  const prompt = document.getElementById('f-prompt').value.trim();

  const label = document.getElementById('f-label').value.trim();
  // 如果目录浏览器中已选中但未确认，自动采用并触发同步行为
  const cwdInput = document.getElementById('f-cwd');
  if (dirBrowserSelectedPath && !cwdInput.value.trim()) {
    cwdInput.value = dirBrowserSelectedPath;
    cwdInput.classList.add('has-value');
    document.getElementById('dir-browser').classList.add('hidden');
    // 自动触发 Git 检测（与"选择此目录"按钮逻辑一致）
    try {
      const gr = await fetch('/api/git-info?path=' + encodeURIComponent(dirBrowserSelectedPath));
      const info = await gr.json();
      const section = document.getElementById('worktree-section');
      if (info.isGitRepo) {
        section.classList.add('visible');
        const sel = document.getElementById('f-base-branch');
        sel.innerHTML = info.branches.map(b =>
          '<option value="' + esc(b) + '"' + (b === info.currentBranch ? ' selected' : '') + '>' + esc(b) + '</option>'
        ).join('');
      }
    } catch (_) {}
    toast(t('toast.auto_cwd', dirBrowserSelectedPath));
  }
  const cwd = cwdInput.value.trim();
  const imageFile = document.getElementById('f-image').files[0];

  const worktreeEnabled = document.getElementById('f-worktree-enabled').checked;
  const baseBranch = document.getElementById('f-base-branch').value;
  const worktreeBranch = document.getElementById('f-worktree-branch').value.trim();
  const cliArgs = collectCliArgs();
  const isOrchestrator = document.getElementById('f-orchestrator').checked;

  let fetchOpts;
  if (imageFile) {
    const formData = new FormData();
    formData.append('prompt', prompt);
    formData.append('cliType', selectedCliType);
    if (label) formData.append('label', label);
    if (cwd) formData.append('cwd', cwd);
    formData.append('image', imageFile);
    if (worktreeEnabled) {
      formData.append('worktreeEnabled', 'true');
      formData.append('baseBranch', baseBranch);
      if (worktreeBranch) formData.append('worktreeBranch', worktreeBranch);
    }
    if (cliArgs.length > 0) formData.append('cliArgs', JSON.stringify(cliArgs));
    if (isOrchestrator) formData.append('role', 'orchestrator');
    fetchOpts = { method: 'POST', body: formData };
  } else {
    const payload = { prompt, cliType: selectedCliType };
    if (label) payload.label = label;
    if (cwd) payload.cwd = cwd;
    if (worktreeEnabled) {
      payload.worktreeEnabled = true;
      payload.baseBranch = baseBranch;
      if (worktreeBranch) payload.worktreeBranch = worktreeBranch;
    }
    if (cliArgs.length > 0) payload.cliArgs = cliArgs;
    if (isOrchestrator) payload.role = 'orchestrator';
    fetchOpts = { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) };
  }

  try {
    const r = await fetch('/api/instances', fetchOpts);
    const j = await r.json();
    if (!r.ok) throw new Error(j.error);
    toast(t('toast.instance_started'), 'success');
    closeModal();
  } catch(e) { toast(e.message, 'error'); }
});

/* ═══════════════════════════════════════════════════════
   Directory Browser
═══════════════════════════════════════════════════════ */
async function browseDir(dirPath) {
  const list = document.getElementById('dir-list');
  list.innerHTML = '<div style="padding:14px;text-align:center;color:var(--text3);font-size:12px;">' + t('dir.loading') + '</div>';
  try {
    const r    = await fetch(`/api/browse?path=${encodeURIComponent(dirPath)}`);
    const data = await r.json();
    if (!r.ok) throw new Error(data.error);
    document.getElementById('dir-current-path').textContent = data.current;
    const upBtn = document.getElementById('dir-nav-up');
    upBtn.disabled = !data.parent;
    upBtn.onclick  = () => data.parent && browseDir(data.parent);
    dirBrowserSelectedPath = data.current;
    document.getElementById('dir-select-label').textContent = data.current;
    if (!data.dirs.length) {
      list.innerHTML = '<div style="padding:14px;text-align:center;color:var(--text3);font-size:12px;">' + t('dir.no_subdirs') + '</div>';
      return;
    }
    list.innerHTML = data.dirs.map(d =>
      `<div class="dir-item" data-path="${esc(d.path)}" data-name="${esc(d.name)}">
        <svg class="dir-item-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M1.5 4C1.5 3.17 2.17 2.5 3 2.5H6L7.5 4H13C13.83 4 14.5 4.67 14.5 5.5V12C14.5 12.83 13.83 13.5 13 13.5H3C2.17 13.5 1.5 12.83 1.5 12V4Z" fill="#e8a882" stroke="#c96442" stroke-width="1.2" stroke-linejoin="round"/></svg>
        <span class="dir-item-name">${esc(d.name)}</span>
        <span class="dir-item-enter">${t('dir.enter')}</span>
      </div>`
    ).join('');
    list.querySelectorAll('.dir-item').forEach(el => {
      el.addEventListener('click', () => {
        list.querySelectorAll('.dir-item').forEach(x => x.classList.remove('selected'));
        el.classList.add('selected');
        dirBrowserSelectedPath = el.dataset.path;
        document.getElementById('dir-select-label').textContent = el.dataset.path;
      });
      el.addEventListener('dblclick', () => browseDir(el.dataset.path));
    });
  } catch(e) {
    list.innerHTML = `<div style="padding:14px;color:var(--red);font-size:12px;">错误: ${esc(e.message)}</div>`;
  }
}

   Toast
═══════════════════════════════════════════════════════ */
function toast(msg, type='') {
  const wrap = document.getElementById('toast-wrap');
  const el   = document.createElement('div');
  el.className   = 'toast ' + type;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

/* ═══════════════════════════════════════════════════════
   Utilities
═══════════════════════════════════════════════════════ */
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDuration(a, b) {
  const s = Math.round((b-a)/1000);
  return s < 60 ? `${s}s` : `${Math.floor(s/60)}m${s%60}s`;
}
function fmtElapsed(a) { return fmtDuration(a, new Date()); }
function fmtDurationShort(ms) {
  const s = Math.round(ms / 1000);
  if (s < 60) return s + 's';
  const m = Math.floor(s / 60);
  return m < 60 ? m + 'min' : Math.floor(m / 60) + 'h' + (m % 60) + 'min';
}

// 每 5s 更新 elapsed 时间 & 闲置标记
setInterval(() => {
  const IDLE_THRESHOLD = 30000;
  let needsGridRefresh = false;
  // 更新 grid 卡片
  document.querySelectorAll('.grid-card').forEach(el => {
    const inst = instances[el.dataset.id];
    if (inst?.status === 'running') {
      const timeEl = el.querySelector('.card-time');
      if (timeEl) timeEl.textContent = fmtElapsed(new Date(inst.startedAt));
      // 等待输入超过2分钟时需要更新标记（追加等待时长显示）
      if (inst.waitingInput && inst.waitingInputSince) {
        const waitingMs = Date.now() - new Date(inst.waitingInputSince).getTime();
        if (waitingMs > 120000) needsGridRefresh = true;
      }
      // 闲置状态变化时刷新（显示/更新闲置时长）
      if (!inst.waitingInput && inst.lastOutputAt) {
        const idleMs = Date.now() - new Date(inst.lastOutputAt).getTime();
        if (idleMs > IDLE_THRESHOLD) needsGridRefresh = true;
      }
    }
  });
  if (needsGridRefresh) scheduleGridRefresh();
  // 更新打开的浮动窗口 header
  Object.keys(openWindows).forEach(id => {
    if (instances[id]?.status === 'running') updateWindowHeader(id);
  });
}, 5000);

async function aiExplain() {
  if (!selectedId) { toast(t('toast.no_instance'), 'error'); return; }

  const overlay = document.getElementById('ai-explain-overlay');
  const content = document.getElementById('ai-explain-content');
  overlay.classList.remove('hidden');
  content.className = 'ai-explain-content loading';
  content.textContent = t('ai.analyzing');

  try {
    const r = await fetch('/api/ai-explain', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ instanceId: selectedId }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error);
    content.className = 'ai-explain-content';
    content.textContent = data.explanation;
  } catch (e) {
    content.className = 'ai-explain-content';
    content.textContent = t('ai.failed') + e.message;
    if (e.message.includes('未配置')) {
      content.textContent += '\n\n' + t('ai.no_key');
    }
  }
}

(function() {
  const TEXTURE_KEY = 'texture-pref';
  const saved = localStorage.getItem(TEXTURE_KEY) || 'none';
  const textures = ['none', 'dots', 'grid', 'diagonal', 'cross', 'noise'];
  const picker = document.getElementById('texture-picker');

  function applyTexture(name) {
    textures.forEach(t => { if (t !== 'none') document.body.classList.remove('texture-' + t); });
    if (name !== 'none') document.body.classList.add('texture-' + name);
    picker.querySelectorAll('.texture-swatch').forEach(b => {
      b.classList.toggle('active', b.dataset.texture === name);
    });
    localStorage.setItem(TEXTURE_KEY, name);
  }

  picker.addEventListener('click', e => {
    const btn = e.target.closest('.texture-swatch');
    if (!btn) return;
    applyTexture(btn.dataset.texture);
  });

  applyTexture(saved);
})();

// 背景图片（IndexedDB 存储，无大小限制）
(function() {
  const IDB_NAME = 'cc-manager-assets', IDB_STORE = 'bg', IDB_KEY = 'bg-image';

  function openDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(IDB_NAME, 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE, { keyPath: 'k' });
      req.onsuccess = e => resolve(e.target.result);
      req.onerror = () => reject(req.error);
    });
  }
  function idbGet(db, key) {
    return new Promise((resolve, reject) => {
      const req = db.transaction(IDB_STORE, 'readonly').objectStore(IDB_STORE).get(key);
      req.onsuccess = () => resolve(req.result?.v ?? null);
      req.onerror = () => reject(req.error);
    });
  }
  function idbSet(db, key, value) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).put({ k: key, v: value });
      tx.oncomplete = resolve; tx.onerror = () => reject(tx.error);
    });
  }
  function idbDel(db, key) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).delete(key);
      tx.oncomplete = resolve; tx.onerror = () => reject(tx.error);
    });
  }

  const urlInput = document.getElementById('bg-image-url');
  const fileInput = document.getElementById('bg-image-file');
  const preview = document.getElementById('bg-image-preview');
  const previewImg = document.getElementById('bg-image-preview-img');
  let _objUrl = null; // 当前 Blob 对应的 ObjectURL

  function setBodyBg(url) {
    if (url) {
      document.body.style.backgroundImage = 'url("' + url.replace(/"/g, '%22') + '")';
      document.body.style.backgroundSize = 'cover';
      document.body.style.backgroundPosition = 'center';
      document.body.style.backgroundAttachment = 'fixed';
      document.body.style.backgroundRepeat = 'no-repeat';
      document.body.classList.add('has-bg-image');
    } else {
      document.body.style.backgroundImage = '';
      document.body.style.backgroundSize = '';
      document.body.style.backgroundPosition = '';
      document.body.style.backgroundAttachment = '';
      document.body.style.backgroundRepeat = '';
      document.body.classList.remove('has-bg-image');
    }
  }

  function showPreview(src) {
    if (src) { previewImg.src = src; preview.style.display = 'block'; }
    else { preview.style.display = 'none'; previewImg.src = ''; }
  }

  // 启动时恢复（同时迁移旧 localStorage 数据）
  openDB().then(async db => {
    let saved = await idbGet(db, IDB_KEY);
    if (!saved) {
      const legacy = localStorage.getItem('bg-image');
      if (legacy) {
        saved = { type: 'url', data: legacy };
        await idbSet(db, IDB_KEY, saved);
        localStorage.removeItem('bg-image');
      }
    }
    if (!saved) return;
    if (saved.type === 'blob') {
      _objUrl = URL.createObjectURL(saved.data);
      setBodyBg(_objUrl);
    } else {
      setBodyBg(saved.data);
    }
  }).catch(() => {
    const legacy = localStorage.getItem('bg-image');
    if (legacy) setBodyBg(legacy);
  });

  // 打开设置面板时填充当前值
  document.getElementById('btn-open-ai-settings').addEventListener('click', async () => {
    fileInput.value = '';
    try {
      const db = await openDB();
      const saved = await idbGet(db, IDB_KEY);
      if (saved?.type === 'url') {
        urlInput.value = saved.data.startsWith('data:') ? '' : saved.data;
        showPreview(saved.data);
      } else if (saved?.type === 'blob' && _objUrl) {
        urlInput.value = '';
        showPreview(_objUrl);
      } else {
        urlInput.value = ''; showPreview(null);
      }
    } catch(_) { urlInput.value = ''; showPreview(null); }
  });

  // 选择文件后实时预览
  fileInput.addEventListener('change', () => {
    if (!fileInput.files[0]) return;
    showPreview(URL.createObjectURL(fileInput.files[0]));
  });

  // 应用
  document.getElementById('bg-image-apply').addEventListener('click', async () => {
    const file = fileInput.files[0];
    const url = urlInput.value.trim();
    if (!file && !url) { toast(t('toast.bg_empty'), 'error'); return; }
    try {
      const db = await openDB();
      if (file) {
        await idbSet(db, IDB_KEY, { type: 'blob', data: file });
        if (_objUrl) URL.revokeObjectURL(_objUrl);
        _objUrl = URL.createObjectURL(file);
        setBodyBg(_objUrl);
        showPreview(_objUrl);
      } else {
        await idbSet(db, IDB_KEY, { type: 'url', data: url });
        if (_objUrl) { URL.revokeObjectURL(_objUrl); _objUrl = null; }
        setBodyBg(url);
        showPreview(url);
      }
      toast(t('toast.bg_applied'), 'success');
    } catch(e) { toast(e.message, 'error'); }
  });

  // 清除
  document.getElementById('bg-image-clear').addEventListener('click', async () => {
    try { const db = await openDB(); await idbDel(db, IDB_KEY); } catch(_) {}
    localStorage.removeItem('bg-image');
    if (_objUrl) { URL.revokeObjectURL(_objUrl); _objUrl = null; }
    fileInput.value = ''; urlInput.value = '';
    setBodyBg(null); showPreview(null);
    toast(t('toast.bg_cleared'), 'success');
  });
})();

      const cr = await fetch('/api/change-password', {
        method: 'PUT',

      });

      document.getElementById('login-overlay').classList.add('hidden');

    } else {
      const r = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: input.value }),
      });
      const d = await r.json();

// ─── Tunnel 状态与开关 ─────────────────────────────────────
(function initTunnel() {
  const statusEl = document.getElementById('tunnel-status');
  const dotEl = document.getElementById('tunnel-dot');
  const labelEl = document.getElementById('tunnel-label');
  let tunnelUrl = null;
  let tunnelEnabled = false;
  let tunnelAvailable = false;
  let toastEl = null;

  function updateUI(d) {
    tunnelAvailable = d.available;
    tunnelEnabled = d.enabled;

    if (!d.available) {
      statusEl.style.display = 'none';
      return;
    }

    statusEl.style.display = 'flex';
    if (d.enabled && d.url) {
      tunnelUrl = d.url;
      dotEl.className = 'tunnel-dot active';
      labelEl.textContent = 'Remote';
    } else if (d.enabled && d.status === 'connecting') {
      tunnelUrl = null;
      dotEl.className = 'tunnel-dot connecting';
      labelEl.textContent = '...';
    } else if (d.enabled) {
      tunnelUrl = null;
      dotEl.className = 'tunnel-dot connecting';
      labelEl.textContent = 'Tunnel';
    } else {
      tunnelUrl = null;
      dotEl.className = 'tunnel-dot';
      labelEl.textContent = 'Tunnel';
    }
  }

  async function checkTunnel() {
    try {
      const r = await fetch('/api/tunnel-status');
      if (!r.ok) return;
      updateUI(await r.json());
    } catch(_) {}
  }

  async function toggleTunnel() {
    const newState = !tunnelEnabled;
    try {
      const r = await fetch('/api/tunnel-toggle', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ enabled: newState }),
      });
      const d = await r.json();
      if (!r.ok) { toast(d.error || '操作失败', 'error'); return; }
      tunnelEnabled = newState;
      toast(newState ? 'Tunnel 正在连接...' : 'Tunnel 已关闭', newState ? 'success' : '');
      if (toastEl) { toastEl.remove(); toastEl = null; }
      checkTunnel();
    } catch(e) { toast('操作失败: ' + e.message, 'error'); }
  }

  function showTunnelPopup() {
    if (toastEl) { toastEl.remove(); toastEl = null; return; }
    toastEl = document.createElement('div');
    toastEl.className = 'tunnel-url-toast';

    if (tunnelEnabled && tunnelUrl) {
      toastEl.innerHTML =
        '<span class="tunnel-url-text">' + esc(tunnelUrl) + '</span>' +
        '<button class="t-copy">复制</button>' +
        '<button class="t-off" style="background:var(--red)">关闭 Tunnel</button>' +
        '<button class="t-dismiss" style="background:var(--text3)">x</button>';
    } else if (tunnelEnabled) {
      toastEl.innerHTML =
        '<span class="tunnel-url-text">正在连接...</span>' +
        '<button class="t-off" style="background:var(--red)">关闭 Tunnel</button>' +
        '<button class="t-dismiss" style="background:var(--text3)">x</button>';
    } else {
      toastEl.innerHTML =
        '<span class="tunnel-url-text">Tunnel 未启用</span>' +
        '<button class="t-on" style="background:var(--green)">开启 Tunnel</button>' +
        '<button class="t-dismiss" style="background:var(--text3)">x</button>';
    }

    document.body.appendChild(toastEl);

    const copyBtn = toastEl.querySelector('.t-copy');
    if (copyBtn) copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(tunnelUrl).then(() => toast('已复制', 'success')).catch(() => {});
    });
    const offBtn = toastEl.querySelector('.t-off');
    if (offBtn) offBtn.addEventListener('click', () => toggleTunnel());
    const onBtn = toastEl.querySelector('.t-on');
    if (onBtn) onBtn.addEventListener('click', () => toggleTunnel());
    toastEl.querySelector('.t-dismiss').addEventListener('click', () => {
      if (toastEl) { toastEl.remove(); toastEl = null; }
    });
  }

  statusEl.addEventListener('click', showTunnelPopup);

  checkTunnel();
  setInterval(checkTunnel, 10000);
})();

let resumeDirSelectedPath = null;

function formatRelativeTime(isoStr) {
  const diff = Date.now() - new Date(isoStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return t('time.just_now');
  if (mins < 60) return t('time.minutes_ago', mins);
  const hours = Math.floor(mins / 60);
  if (hours < 24) return t('time.hours_ago', hours);
  const days = Math.floor(hours / 24);
  if (days < 30) return t('time.days_ago', days);
  return new Date(isoStr).toLocaleDateString(currentLang === 'zh' ? 'zh-CN' : 'en-US');
}

async function loadRecentSessions(cwd) {
  const list = document.getElementById('resume-session-list');
  list.innerHTML = '<div class="resume-loading">' + t('dir.loading') + '</div>';
  try {
    const url = '/api/recent-sessions' + (cwd ? '?cwd=' + encodeURIComponent(cwd) : '');
    const r = await fetch(url);
    const sessions = await r.json();
    if (!r.ok) throw new Error(sessions.error);
    if (!sessions.length) {
      list.innerHTML = '<div class="resume-empty">' + t('resume.no_sessions') + '</div>';
      return;
    }
    list.innerHTML = sessions.map(s => {
      const nameHtml = s.name ? '<div class="resume-item-name">' + esc(s.name) + '</div>' : '';
      const cwdHtml = (!cwd && s.cwd) ? '<div class="resume-item-id" style="margin-top:2px;">' + esc(s.cwd) + '</div>' : '';
      return '<div class="resume-item" data-session-id="' + esc(s.sessionId) + '" data-session-cwd="' + esc(s.cwd || '') + '">' +
        '<div class="resume-item-header">' +
          '<span class="resume-item-id">' + esc(s.sessionId.slice(0, 8)) + '...</span>' +
          '<span class="resume-item-time">' + formatRelativeTime(s.lastModified) + '</span>' +
        '</div>' +
        nameHtml +
        '<div class="resume-item-msg">' + esc(s.firstMessage) + '</div>' +
        cwdHtml +
      '</div>';
    }).join('');

    list.querySelectorAll('.resume-item').forEach(item => {
      item.addEventListener('click', async () => {
        const sessionId = item.dataset.sessionId;
        const sessionCwd = item.dataset.sessionCwd;
        const cwd = resumeDirSelectedPath || document.getElementById('resume-cwd').value.trim() || sessionCwd || '';
        try {
          const payload = {
            cliType: 'claude',
            cliArgs: ['--resume', sessionId],
          };
          if (cwd) payload.cwd = cwd;
          // 用第一条消息的前 30 个字符作为 label
          const msgEl = item.querySelector('.resume-item-msg');
          const msg = msgEl ? msgEl.textContent : '';
          payload.label = '[Resume] ' + (msg.length > 30 ? msg.slice(0, 30) + '...' : msg);
          const r = await fetch('/api/instances', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          const j = await r.json();
          if (!r.ok) throw new Error(j.error);
          toast(t('toast.session_resumed'), 'success');
          closeResumeModal();
        } catch (e) {
          toast(t('toast.resume_failed') + e.message, 'error');
        }
      });
    });
  } catch (e) {
    list.innerHTML = '<div class="resume-empty">' + t('toast.load_failed') + esc(e.message) + '</div>';
  }
}

function closeResumeModal() {
  document.getElementById('resume-overlay').classList.add('hidden');

document.getElementById('resume-btn-select-dir').addEventListener('click', () => {
  if (!resumeDirSelectedPath) return;
  const cwdInput = document.getElementById('resume-cwd');
  cwdInput.value = resumeDirSelectedPath;
  cwdInput.classList.add('has-value');
  document.getElementById('resume-dir-browser').classList.add('hidden');
  loadRecentSessions(resumeDirSelectedPath);
});
</script>
</body>
</html>
