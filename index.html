<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="CC Manager" />
<meta name="theme-color" content="#f4f2ee" />
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/icon-192.png" />
<title>Claude Code · 多实例管理器</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet" />
<!-- xterm.js via unpkg (more reliable) -->
<link rel="stylesheet" href="https://unpkg.com/xterm@5.3.0/css/xterm.css" />
<script src="https://unpkg.com/xterm@5.3.0/lib/xterm.js"></script>
<script src="https://unpkg.com/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #f4f2ee;
    --surface:   #ffffff;
    --surface2:  #f9f8f6;
    --border:    #e2ddd6;
    --border2:   #ccc8c0;
    --text:      #1a1814;
    --text2:     #6b6560;
    --text3:     #9e9890;
    --accent:    #c96442;
    --accent2:   #e8855e;
    --green:     #3d7a5a;
    --red:       #b03535;
    --blue:      #2a5a8a;
    --term-bg:   #1a1814;
    --radius:    10px;
    --radius-sm: 6px;
    --shadow-lg: 0 2px 8px rgba(0,0,0,.08), 0 8px 24px rgba(0,0,0,.06);
    --font-sans: 'Sora', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
    --transition: .18s ease;
  }

  html, body { height: 100%; }
  body {
    font-family: var(--font-sans);
    background-color: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.6;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    height: 56px;
    position: sticky; top: 0; z-index: 100;
    flex-shrink: 0;
  }
  .logo { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 15px; }
  .logo-icon {
    width: 28px; height: 28px;
    background: var(--accent); border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 13px; font-weight: 700; font-family: var(--font-mono);
  }
  .header-stats { display: flex; gap: 16px; margin-left: auto; font-size: 12px; color: var(--text2); }
  .stat-item { display: flex; align-items: center; gap: 6px; }
  .stat-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border2); }
  .stat-dot.ok  { background: var(--green); }
  .stat-dot.err { background: var(--red); }
  .stat-dot.running { background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── Layout ── */
  .layout { display: flex; flex: 1; overflow: hidden; position:relative; }

  /* ── Shared ── */
  .btn-new {
    display: flex; align-items: center; gap: 5px;
    background: var(--accent); color: #fff; border: none;
    border-radius: var(--radius-sm); padding: 5px 10px;
    font-size: 12px; font-weight: 500; cursor: pointer; font-family: var(--font-sans);
    transition: background var(--transition);
  }
  .btn-new:hover { background: var(--accent2); }
  .lang-btn {
    background: none; border: 1px solid var(--border2); color: var(--text2);
    border-radius: var(--radius-sm); padding: 3px 8px;
    font-size: 11px; font-weight: 600; cursor: pointer; font-family: var(--font-mono);
    transition: all var(--transition);
  }
  .lang-btn:hover { border-color: var(--accent); color: var(--accent); }

  .inst-badge {
    font-size: 10px; font-weight: 600; letter-spacing:.04em;
    padding: 2px 7px; border-radius: 20px; font-family: var(--font-mono);
  }
  .badge-running { background:#dff2ea; color:var(--green); }
  .badge-done    { background:#e8f0fa; color:var(--blue); }
  .badge-error   { background:#fae8e8; color:var(--red); }
  .badge-stopped { background:#f0ede8; color:var(--text2); }

  .empty-state { padding: 48px 24px; text-align: center; color: var(--text3); font-size: 13px; grid-column: 1 / -1; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; }
  .empty-icon  { font-size: 32px; margin-bottom: 10px; opacity: .5; }

  /* ── Grid View ── */
  .grid-view {
    flex: 1; display: flex; flex-direction: column;
    overflow: hidden;
  }
  .grid-header {
    padding: 16px 24px 12px; display: flex;
    align-items: center; justify-content: space-between; flex-shrink: 0;
    max-width:1000px; width:100%; margin:0 auto;
  }
  .grid-title {
    font-size: 13px; font-weight: 600; letter-spacing:.06em;
    text-transform: uppercase; color: var(--text3);
  }
  .grid-container {
    flex: 1; overflow-y: auto; padding: 0 24px 24px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px; align-content: start;
    max-width:1000px; width:100%; margin:0 auto;
  }
  .grid-container::-webkit-scrollbar { width: 5px; }
  .grid-container::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  .grid-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px; cursor: pointer;
    transition: all var(--transition); display: flex; flex-direction: column;
    gap: 10px; min-height: 140px;
  }
  .grid-card:hover { border-color: var(--border2); box-shadow: 0 2px 8px rgba(0,0,0,.06); transform: translateY(-1px); }
  .grid-card.status-running { border-left: 3px solid var(--green); }
  .grid-card.status-done    { border-left: 3px solid var(--blue); }
  .grid-card.status-error   { border-left: 3px solid var(--red); }
  .grid-card.status-stopped { border-left: 3px solid var(--border2); }

  .card-row1 { display: flex; align-items: center; gap: 8px; }
  .card-label { font-size: 14px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-status-tag { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 9px; white-space: nowrap; }
  .card-status-tag.tag-waiting { background: var(--accent); color: #fff; }
  .card-status-tag.tag-idle { background: #f5e6d0; color: #b8860b; }
  .card-waiting { font-size: 11px; color: var(--accent); font-weight: 500; animation: pulse 1.5s infinite; white-space: nowrap; }
  .card-prompt { font-size: 12px; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-output {
    font-size: 11.5px; font-family: var(--font-mono); color: var(--text3);
    background: var(--surface2); border-radius: var(--radius-sm);
    padding: 8px 10px; line-height: 1.5; max-height: 60px;
    overflow: hidden; white-space: pre-wrap; word-break: break-all;
  }
  .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: auto; }
  .card-remove-btn {
    font-size:11px; padding:2px 8px; border:1px solid var(--border); border-radius:var(--radius-sm);
    background:transparent; color:var(--text3); cursor:pointer; transition:all .15s;
  }
  .card-remove-btn:hover { background:var(--red); color:#fff; border-color:var(--red); }

  /* ── Card inline input (waiting) ── */
  .card-inline-input {
    display:flex; gap:6px; align-items:center; flex-wrap:wrap;
    margin-top:6px; padding:8px 10px;
    background:#fef9f0; border:1px solid #f0d5a0; border-radius:var(--radius-sm);
    animation: inputPulse 2s infinite;
  }
  .card-inline-input .card-quick-btn {
    padding:3px 10px; font-size:11px; font-weight:500; cursor:pointer;
    border:1px solid var(--border); border-radius:var(--radius-sm);
    background:var(--surface); color:var(--text); font-family:var(--font-mono);
    transition: background var(--transition), border-color var(--transition);
  }
  .card-inline-input .card-quick-btn:hover { background:var(--accent); color:#fff; border-color:var(--accent); }
  .card-inline-input .card-inline-field {
    flex:1; min-width:80px; border:1px solid var(--border); border-radius:var(--radius-sm);
    padding:4px 8px; font-size:12px; font-family:var(--font-mono);
    background:var(--bg); color:var(--text); outline:none;
  }
  .card-inline-input .card-inline-field:focus { border-color:var(--accent); }
  .card-inline-input .card-inline-send {
    padding:4px 10px; font-size:11px; font-weight:500; cursor:pointer;
    background:var(--accent); color:#fff; border:none; border-radius:var(--radius-sm);
    font-family:var(--font-sans);
  }
  .card-inline-input .card-inline-send:hover { background:var(--accent2); }
  .card-time { font-size: 11px; color: var(--text3); font-family: var(--font-mono); }

  /* ── View Mode Switcher ── */
  .view-switcher { display:flex; gap:2px; background:var(--bg2); border-radius:var(--radius-sm); padding:2px; }
  .view-mode-btn {
    font-size:11px; padding:3px 8px; border:none; border-radius:3px;
    background:transparent; color:var(--text3); cursor:pointer; transition:all .15s; white-space:nowrap;
  }
  .view-mode-btn.active { background:var(--surface); color:var(--text); box-shadow:0 1px 2px rgba(0,0,0,.08); }
  .view-mode-btn:not(.active):hover { color:var(--text2); }

  /* ── List View ── */
  .grid-container.view-list {
    display:flex; flex-direction:column; gap:8px;
    grid-template-columns:none;
  }
  .view-list .grid-card {
    flex-direction:row; align-items:center; gap:12px;
    min-height:auto; padding:12px 16px;
  }
  .view-list .card-row1 { flex:0 0 auto; min-width:200px; }
  .view-list .card-prompt { flex:1; min-width:0; }
  .view-list .card-output { display:none; }
  .view-list .card-footer { margin-top:0; flex:0 0 auto; }

  /* ── Compact View ── */
  .grid-container.view-compact {
    display:flex; flex-direction:column; gap:2px;
    grid-template-columns:none;
  }
  .view-compact .grid-card {
    flex-direction:row; align-items:center; gap:10px;
    min-height:auto; padding:6px 12px; border-radius:var(--radius-sm);
    border-left-width:2px;
  }
  .view-compact .card-row1 { gap:6px; }
  .view-compact .card-label { font-size:13px; }
  .view-compact .inst-badge { font-size:9px; padding:1px 5px; }
  .view-compact .cli-badge { font-size:9px; padding:0 4px; }
  .view-compact .card-prompt { flex:1; min-width:0; font-size:11px; }
  .view-compact .card-output { display:none; }
  .view-compact .card-footer { margin-top:0; flex:0 0 auto; }
  .view-compact .card-waiting { font-size:10px; }
  .view-compact .card-status-tag { font-size:9px; padding:1px 6px; }

  /* ── Kanban View ── */
  .grid-container.view-kanban {
    display:flex; gap:16px; align-items:flex-start;
    grid-template-columns:none; flex-wrap:nowrap; overflow-x:auto;
  }
  .kanban-col {
    flex:1; min-width:220px; max-width:320px;
    background:var(--bg2); border-radius:var(--radius); padding:10px;
    display:flex; flex-direction:column; gap:8px;
  }
  .kanban-col-title {
    font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.05em;
    color:var(--text3); padding:4px 6px; display:flex; align-items:center; gap:6px;
  }
  .kanban-col-title .kanban-count {
    font-size:10px; background:var(--border); border-radius:8px; padding:0 6px;
    font-weight:500;
  }
  .kanban-col .grid-card { min-height:auto; gap:8px; padding:12px; }
  .kanban-col .card-output { max-height:40px; font-size:10.5px; }

  /* ── Waterfall (Masonry) View ── */
  .grid-container.view-waterfall {
    display:columns; columns:3 280px; column-gap:16px;
    grid-template-columns:none;
  }
  .view-waterfall .grid-card {
    break-inside:avoid; margin-bottom:16px; display:inline-flex;
    width:100%;
  }
  .view-waterfall .card-output { max-height:none; }

  /* ── Minimal View ── */
  .grid-container.view-minimal {
    display:grid; grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));
    gap:10px;
  }
  .view-minimal .grid-card {
    min-height:auto; padding:14px; gap:6px; text-align:center;
    align-items:center; justify-content:center;
  }
  .view-minimal .card-row1 { flex-direction:column; gap:4px; justify-content:center; }
  .view-minimal .card-label { font-size:13px; white-space:normal; text-align:center; }
  .view-minimal .card-prompt { display:none; }
  .view-minimal .card-output { display:none; }
  .view-minimal .card-footer { justify-content:center; }
  .view-minimal .cli-badge { margin-left:0; }

  /* ── Industrial View ── */
  .grid-container.view-industrial {
    display:flex; flex-direction:column; gap:1px;
    grid-template-columns:none; background:var(--border);
    border:1px solid var(--border); border-radius:var(--radius-sm);
  }
  .view-industrial .grid-card {
    border:none; border-radius:0; border-left:none;
    min-height:auto; padding:10px 14px; gap:6px;
    font-family:var(--font-mono); background:var(--surface);
  }
  .view-industrial .grid-card:first-child { border-radius:var(--radius-sm) var(--radius-sm) 0 0; }
  .view-industrial .grid-card:last-child  { border-radius:0 0 var(--radius-sm) var(--radius-sm); }
  .view-industrial .grid-card:hover { transform:none; box-shadow:none; background:var(--bg2); }
  .view-industrial .card-row1 { gap:6px; }
  .view-industrial .card-label { font-size:12px; font-weight:500; font-family:var(--font-mono); }
  .view-industrial .inst-badge {
    font-size:9px; padding:1px 5px; border-radius:2px;
    font-family:var(--font-mono); text-transform:uppercase; letter-spacing:.05em;
  }
  .view-industrial .cli-badge { font-size:9px; border-radius:2px; font-family:var(--font-mono); }
  .view-industrial .card-prompt { font-family:var(--font-mono); font-size:11px; }
  .view-industrial .card-output {
    border-radius:2px; font-size:10.5px; padding:6px 8px;
    background:#1a1a1a; color:#b0b0b0; max-height:48px;
  }
  .view-industrial .card-footer { margin-top:4px; }
  .view-industrial .card-time { font-size:10px; }
  .view-industrial .card-remove-btn { font-size:10px; border-radius:2px; font-family:var(--font-mono); }
  .view-industrial .grid-card.status-running { border-left:3px solid var(--green); }
  .view-industrial .grid-card.status-done    { border-left:3px solid var(--blue); }
  .view-industrial .grid-card.status-error   { border-left:3px solid var(--red); }
  .view-industrial .grid-card.status-stopped { border-left:3px solid var(--border2); }

  /* ── Floating Window Layer ── */
  .win-layer {
    position:absolute; inset:0; pointer-events:none; overflow:hidden;
  }
  .float-win {
    position:absolute; pointer-events:auto;
    display:flex; flex-direction:column;
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius); box-shadow:var(--shadow-lg);
    min-width:480px; min-height:320px;
    transition:box-shadow .15s ease;
  }
  .float-win.focused {
    box-shadow:0 4px 16px rgba(0,0,0,.12), 0 12px 40px rgba(0,0,0,.10);
    border-color:var(--border2);
  }
  .win-header {
    display:flex; align-items:center; gap:10px;
    padding:10px 14px; background:var(--surface);
    border-bottom:1px solid var(--border);
    cursor:grab; user-select:none; flex-shrink:0;
    border-radius:var(--radius) var(--radius) 0 0;
  }
  .win-header:active { cursor:grabbing; }
  .win-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .win-dot.running { background:var(--green); box-shadow:0 0 6px var(--green); }
  .win-dot.done    { background:var(--blue); }
  .win-dot.error   { background:var(--red); }
  .win-dot.stopped { background:var(--border2); }
  .win-title { font-size:13px; font-weight:600; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; cursor:text; }
  .cli-badge {
    font-size:10px; padding:1px 6px; border-radius:3px; font-weight:500;
    background:rgba(0,0,0,.12); color:var(--text2); margin-left:6px; flex-shrink:0;
  }
  .win-meta  { font-size:11px; color:var(--text3); font-family:var(--font-mono); white-space:nowrap; }
  .win-actions { display:flex; gap:6px; align-items:center; flex-shrink:0; }
  .win-close {
    width:24px; height:24px; border-radius:50%; border:none;
    background:transparent; color:var(--text3); cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    font-size:16px; line-height:1; transition:all var(--transition);
  }
  .win-close:hover { background:var(--red); color:#fff; }
  .win-body { flex:1; overflow:hidden; position:relative; }
  .win-resize-edge {
    position:absolute; z-index:11;
  }
  .win-resize-edge.edge-n { top:-6px; left:6px; right:6px; height:6px; cursor:ns-resize; }
  .win-resize-edge.edge-s { bottom:-6px; left:6px; right:6px; height:6px; cursor:ns-resize; }
  .win-resize-edge.edge-w { left:-6px; top:6px; bottom:6px; width:6px; cursor:ew-resize; }
  .win-resize-edge.edge-e { right:-6px; top:6px; bottom:6px; width:6px; cursor:ew-resize; }
  .win-resize-edge.edge-nw { top:-6px; left:-6px; width:12px; height:12px; cursor:nwse-resize; }
  .win-resize-edge.edge-ne { top:-6px; right:-6px; width:12px; height:12px; cursor:nesw-resize; }
  .win-resize-edge.edge-sw { bottom:-6px; left:-6px; width:12px; height:12px; cursor:nesw-resize; }
  .win-resize-edge.edge-se { bottom:-6px; right:-6px; width:12px; height:12px; cursor:nwse-resize; }

  /* ── 任务队列面板 ── */
  .win-content-area { display:flex; flex:1; overflow:hidden; }
  .win-body-col { display:flex; flex-direction:column; flex:1; min-width:0; overflow:hidden; }

  .win-queue-toggle {
    background:transparent; border:none; color:var(--text3); cursor:pointer;
    font-size:14px; padding:2px 6px; border-radius:var(--radius-sm);
    transition:all var(--transition); position:relative;
  }
  .win-queue-toggle:hover { color:var(--accent); background:var(--surface2); }
  .win-queue-toggle.active { color:var(--accent); }
  .win-queue-badge {
    position:absolute; top:-4px; right:-4px;
    background:var(--accent); color:#fff; font-size:9px; font-weight:600;
    min-width:14px; height:14px; border-radius:7px;
    display:flex; align-items:center; justify-content:center;
    padding:0 3px; line-height:1;
  }

  .task-queue-panel {
    width:280px; flex-shrink:0; border-left:1px solid var(--border);
    background:var(--surface2); display:none; flex-direction:column; overflow:hidden;
  }
  .task-queue-panel.open { display:flex; }

  .tq-header {
    padding:10px 12px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
  }
  .tq-header-title { font-size:12px; font-weight:600; color:var(--text); }

  .tq-list {
    flex:1; overflow-y:auto; padding:8px;
  }
  .tq-list::-webkit-scrollbar { width:4px; }
  .tq-list::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

  .tq-empty {
    text-align:center; color:var(--text3); font-size:12px; padding:24px 12px;
  }

  .tq-item {
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius-sm); padding:8px 10px; margin-bottom:6px;
    position:relative; font-size:12px;
  }
  .tq-item.sent { opacity:.5; }
  .tq-item.sending { border-color:var(--accent); }
  .tq-item-index {
    font-size:10px; color:var(--text3); font-weight:500; margin-bottom:4px;
  }
  .tq-item-text {
    color:var(--text); line-height:1.4; word-break:break-word;
    white-space:pre-wrap; cursor:text;
  }
  .tq-item-text:hover { background:var(--surface2); border-radius:3px; }
  .tq-item-edit {
    width:100%; min-height:50px; padding:6px 8px; border:1px solid var(--accent);
    border-radius:4px; background:var(--surface); color:var(--text);
    font-size:12px; font-family:inherit; line-height:1.4; resize:vertical;
  }
  .tq-item-edit:focus { outline:none; border-color:var(--accent2); }
  .tq-edit-actions { display:flex; gap:4px; margin-top:4px; }
  .tq-edit-actions button { font-size:10px; padding:2px 10px; border-radius:3px; cursor:pointer; border:1px solid var(--border); background:var(--surface); color:var(--text2); }
  .tq-edit-actions .tq-save-btn { background:var(--accent); color:#fff; border-color:var(--accent); }
  .tq-edit-actions .tq-save-btn:hover { background:var(--accent2); }
  .tq-item-image {
    font-size:10px; color:var(--blue); margin-top:4px;
  }
  .tq-item-actions {
    display:flex; gap:4px; margin-top:6px;
  }
  .tq-item-btn {
    font-size:10px; padding:2px 8px; border-radius:3px; border:1px solid var(--border);
    background:var(--surface); color:var(--text2); cursor:pointer;
    transition:all var(--transition);
  }
  .tq-item-btn:hover { border-color:var(--accent); color:var(--accent); }
  .tq-item-btn.send-btn:hover { background:var(--accent); color:#fff; border-color:var(--accent); }
  .tq-item-btn.del-btn:hover { background:var(--red); color:#fff; border-color:var(--red); }

  .tq-add-form {
    padding:8px; border-top:1px solid var(--border); flex-shrink:0;
  }
  .tq-add-textarea {
    width:100%; min-height:48px; max-height:100px; resize:vertical;
    border:1px solid var(--border); border-radius:var(--radius-sm);
    padding:6px 8px; font-size:12px; font-family:var(--font-mono);
    background:var(--surface); color:var(--text); outline:none;
  }
  .tq-add-textarea:focus { border-color:var(--accent); }
  .tq-add-row {
    display:flex; gap:6px; margin-top:6px; align-items:center;
  }
  .tq-add-pos {
    width:50px; border:1px solid var(--border); border-radius:3px;
    padding:3px 6px; font-size:11px; text-align:center; outline:none;
    background:var(--surface); color:var(--text);
  }
  .tq-add-pos:focus { border-color:var(--accent); }
  .tq-file-label {
    font-size:11px; color:var(--text3); cursor:pointer; padding:3px 8px;
    border:1px solid var(--border); border-radius:3px; background:var(--surface);
    white-space:nowrap;
  }
  .tq-file-label:hover { border-color:var(--accent); color:var(--accent); }
  .tq-add-btn {
    margin-left:auto; font-size:11px; padding:4px 12px; border-radius:3px;
    border:none; background:var(--accent); color:#fff; cursor:pointer;
    font-weight:500; transition:background var(--transition);
  }
  .tq-add-btn:hover { background:var(--accent2); }
  .tq-add-btn:disabled { opacity:.4; cursor:not-allowed; }

  .tq-actions {
    padding:8px; border-top:1px solid var(--border); flex-shrink:0;
  }
  .tq-send-all-btn {
    width:100%; padding:6px; font-size:12px; font-weight:500;
    border:none; border-radius:var(--radius-sm);
    background:var(--accent); color:#fff; cursor:pointer;
    transition:background var(--transition);
  }
  .tq-send-all-btn:hover { background:var(--accent2); }
  .tq-send-all-btn:disabled { opacity:.4; cursor:not-allowed; }

  .btn {
    display:flex; align-items:center; gap:5px;
    border:1px solid var(--border); background:var(--surface);
    border-radius:var(--radius-sm); padding:5px 12px;
    font-size:12.5px; font-weight:500; cursor:pointer; font-family:var(--font-sans);
    color:var(--text); transition:all var(--transition);
  }
  .btn:hover { background:var(--surface2); border-color:var(--border2); }
  .btn-stop  { color:var(--red); border-color:#f0d0d0; }
  .btn-stop:hover { background:#fdf0f0; }

  /* ── Terminal area ── */
  .terminal-wrap {
    flex:1; display:flex; flex-direction:column; overflow:hidden;
    background: var(--term-bg);
    position: relative;
  }
  .terminal-wrap .xterm { padding: 12px; height: 100%; }
  .terminal-wrap .xterm-viewport::-webkit-scrollbar { width: 5px; }
  .terminal-wrap .xterm-viewport::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

  .scroll-bottom-btn {
    position:absolute; bottom:10px; right:16px; z-index:5;
    background:var(--accent); color:#fff; border:none; border-radius:50%;
    width:32px; height:32px; cursor:pointer; font-size:16px; line-height:32px;
    text-align:center; box-shadow:0 2px 8px rgba(0,0,0,.25);
    opacity:0; pointer-events:none; transition:opacity .15s;
  }
  .scroll-bottom-btn.visible { opacity:.85; pointer-events:auto; }
  .scroll-bottom-btn:hover { opacity:1; }

  /* ── Input bar ── */
  .input-bar {
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 10px 16px; display: flex; gap: 10px; align-items: center; flex-shrink:0;
  }
  .input-bar.waiting {
    background: #fef9f0; border-top-color: #f0d5a0;
    animation: inputPulse 2s infinite;
  }
  @keyframes inputPulse { 0%,100%{background:#fef9f0} 50%{background:#fdf3e0} }

  .input-waiting-label {
    font-size:11.5px; color:var(--accent); font-weight:500;
    white-space:nowrap; display:none;
  }
  .input-bar.waiting .input-waiting-label { display:block; }

  .input-field {
    flex:1; border:1px solid var(--border); border-radius:var(--radius-sm);
    padding: 7px 12px; font-size:13px; font-family:var(--font-mono);
    background:var(--bg); color:var(--text); outline:none;
    transition: border-color var(--transition);
  }
  .input-field:focus { border-color:var(--accent); background:var(--surface); }
  .input-field:disabled { opacity:.4; cursor:not-allowed; }

  .btn-send {
    background:var(--accent); color:#fff; border:none;
    border-radius:var(--radius-sm); padding:7px 16px;
    font-size:12.5px; font-weight:500; cursor:pointer; font-family:var(--font-sans);
    transition:background var(--transition); white-space:nowrap;
  }
  .btn-send:hover:not(:disabled) { background:var(--accent2); }
  .btn-send:disabled { opacity:.4; cursor:not-allowed; }

  .quick-btns { display:flex; gap:6px; }
  .quick-btn {
    background:var(--surface2); border:1px solid var(--border2);
    border-radius:var(--radius-sm); padding:5px 10px;
    font-size:12px; cursor:pointer; font-family:var(--font-mono);
    color:var(--text2); transition:all var(--transition);
  }
  .quick-btn:hover { background:#fef5f1; border-color:var(--accent); color:var(--accent); }

  .btn-attach {
    display: flex; align-items: center; gap: 5px;
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: var(--radius-sm); padding: 6px 11px;
    font-size: 12px; font-weight: 500; cursor: pointer;
    font-family: var(--font-sans); color: var(--text2);
    transition: all var(--transition); white-space: nowrap; flex-shrink: 0;
  }
  .btn-attach:hover { background: #fef5f1; border-color: var(--accent); color: var(--accent); }
  .btn-attach:disabled { opacity: .4; cursor: not-allowed; }

  .img-preview-bar {
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 8px 16px; display: flex; align-items: center; gap: 10px;
    flex-shrink: 0;
  }
  .img-preview-bar.hidden { display: none; }
  .img-preview-thumb {
    width: 48px; height: 48px; object-fit: cover;
    border-radius: 6px; border: 1px solid var(--border);
    flex-shrink: 0;
  }
  .img-preview-info { flex: 1; min-width: 0; }
  .img-preview-name { font-size: 12.5px; font-weight: 500; color: var(--text); font-family: var(--font-mono); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .img-preview-hint { font-size: 11.5px; color: var(--text3); margin-top: 2px; }
  .img-preview-remove {
    background: none; border: none; cursor: pointer;
    color: var(--text3); font-size: 16px; padding: 4px;
    border-radius: 4px; transition: color var(--transition);
    flex-shrink: 0;
  }
  .img-preview-remove:hover { color: var(--red); }

  /* ── Modal ── */
  .overlay {
    position:fixed; inset:0; background:rgba(0,0,0,.25);
    display:flex; align-items:center; justify-content:center;
    z-index:200; animation:fadeIn .15s ease;
  }
  .overlay.hidden { display:none; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .modal {
    background:var(--surface); border-radius:14px; width:520px;
    box-shadow:var(--shadow-lg); padding:28px;
    animation:slideUp .2s ease; max-height:90vh; overflow-y:auto;
  }
  @keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
  .modal-title { font-size:17px; font-weight:600; margin-bottom:20px; }
  .modal-mode-switcher {
    display: flex; gap: 0; margin-bottom: 18px;
  }
  .modal-mode-btn {
    flex: 1; padding: 8px 0; font-size: 13px; font-weight: 500;
    border: 1px solid var(--border); background: var(--surface2);
    cursor: pointer; color: var(--text2); transition: all var(--transition);
    font-family: var(--font-sans);
  }
  .modal-mode-btn:first-child { border-radius: var(--radius-sm) 0 0 var(--radius-sm); }
  .modal-mode-btn:last-child { border-radius: 0 var(--radius-sm) var(--radius-sm) 0; border-left: none; }
  .modal-mode-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .cli-type-selector { display:flex; gap:0; margin-bottom:18px; border-radius:var(--radius); overflow:hidden; border:1px solid var(--border); }
  .cli-type-btn {
    flex:1; padding:8px 0; text-align:center; font-size:13px; font-weight:500;
    cursor:pointer; background:var(--bg2); color:var(--text2); border:none;
    border-right:1px solid var(--border); transition:all .15s;
  }
  .cli-type-btn:last-child { border-right:none; }
  .cli-type-btn.active { background:var(--accent); color:#fff; }
  .cli-type-btn:not(.active):hover { background:var(--border); }
  .cli-type-btn:disabled { opacity:.35; cursor:not-allowed; }
  .cli-type-btn:disabled:hover { background:var(--bg2); }

  .worktree-section { display:none; margin-top:4px; }
  .worktree-section.visible { display:block; }
  .worktree-toggle { display:flex; align-items:center; gap:8px; cursor:pointer; font-size:13px; color:var(--text); margin-bottom:10px; }
  .worktree-toggle input[type="checkbox"] { accent-color:var(--accent); }
  .worktree-opts { display:none; gap:10px; flex-direction:column; }
  .worktree-opts.visible { display:flex; }
  .worktree-opts select, .worktree-opts input[type="text"] {
    border:1px solid var(--border); border-radius:var(--radius-sm); padding:6px 10px;
    font-size:13px; font-family:var(--font-sans); background:var(--surface); color:var(--text); outline:none;
  }
  .worktree-opts select:focus, .worktree-opts input[type="text"]:focus { border-color:var(--accent); }

  /* 高级参数 */
  .cli-args-section { margin-top:8px; }
  .cli-args-toggle {
    display:flex; align-items:center; gap:6px; cursor:pointer;
    font-size:12px; color:var(--text2); padding:6px 0; user-select:none;
  }
  .cli-args-toggle:hover { color:var(--text); }
  .cli-args-toggle .arrow { transition:transform .15s; font-size:10px; }
  .cli-args-toggle .arrow.open { transform:rotate(90deg); }
  .cli-args-body { display:none; flex-direction:column; gap:8px; padding:8px 0 4px; }
  .cli-args-body.visible { display:flex; }
  .cli-args-body .field { margin-bottom:0; }
  .cli-args-body .field label { font-size:12px; margin-bottom:3px; }
  .cli-args-body input[type="text"],
  .cli-args-body select {
    border:1px solid var(--border); border-radius:var(--radius-sm); padding:5px 8px;
    font-size:12px; font-family:var(--font-sans); background:var(--surface); color:var(--text); outline:none; width:100%; box-sizing:border-box;
  }
  .cli-args-body input[type="text"]:focus,
  .cli-args-body select:focus { border-color:var(--accent); }
  .cli-args-row { display:flex; gap:8px; }
  .cli-args-row .field { flex:1; }
  .cli-args-chips { display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; }
  .cli-args-chip {
    display:inline-flex; align-items:center; gap:3px;
    font-size:11px; padding:2px 8px; border-radius:10px;
    background:rgba(42,90,138,.1); color:var(--accent); cursor:pointer; user-select:none;
    border:1px solid transparent; transition:all .15s;
  }
  .cli-args-chip:hover { background:rgba(42,90,138,.18); }
  .cli-args-chip.active { background:var(--accent); color:#fff; }
  .cli-args-custom { margin-top:4px; }
  .cli-args-custom input { font-family:var(--font-mono); font-size:11px; }

  .git-branch-badge {
    font-size:10px; padding:1px 6px; border-radius:3px; font-weight:500;
    background:rgba(42,90,138,.15); color:#4a90c4; font-family:var(--font-mono);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:120px; flex-shrink:0;
  }
  .worktree-indicator {
    font-size:9px; padding:1px 5px; border-radius:3px;
    background:rgba(61,122,90,.15); color:var(--green); font-weight:600; flex-shrink:0;
  }
  .orchestrator-badge {
    font-size:9px; padding:1px 5px; border-radius:3px;
    background:rgba(138,90,42,.15); color:#b8860b; font-weight:600; flex-shrink:0;
  }
  .wt-cleanup-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,.4);
    display:flex; align-items:center; justify-content:center; z-index:2000;
  }
  .wt-cleanup-dialog { background:var(--surface); border-radius:var(--radius); padding:24px; max-width:420px; width:90%; box-shadow:0 8px 32px rgba(0,0,0,.2); }
  .wt-cleanup-title { font-size:15px; font-weight:600; margin-bottom:16px; }
  .cleanup-option {
    display:block; width:100%; text-align:left; padding:10px 12px; border:1px solid var(--border);
    border-radius:var(--radius-sm); margin-bottom:8px; cursor:pointer; background:transparent; transition:all .15s;
  }
  .cleanup-option:hover { border-color:var(--accent); background:var(--bg2); }
  .cleanup-option-title { font-size:13px; font-weight:600; color:var(--text); }
  .cleanup-option-desc { font-size:12px; color:var(--text2); margin-top:2px; }
  .conflict-file-list {
    max-height:200px; overflow-y:auto; margin:12px 0; font-family:var(--font-mono);
    font-size:12px; background:var(--bg2); border-radius:var(--radius-sm); padding:10px;
  }

  .field { margin-bottom:16px; }
  .field label { display:block; font-size:12px; font-weight:500; color:var(--text2); margin-bottom:6px; }
  .field input, .field textarea {
    width:100%; border:1px solid var(--border); border-radius:var(--radius-sm);
    padding:9px 12px; font-size:13.5px; font-family:var(--font-sans);
    background:var(--bg); color:var(--text); outline:none;
    transition:border-color var(--transition);
  }
  .field input:focus, .field textarea:focus { border-color:var(--accent); background:var(--surface); }
  .field textarea { height:90px; resize:vertical; font-family:var(--font-mono); font-size:12.5px; }

  .dir-picker { display:flex; gap:8px; align-items:center; }
  .dir-picker input[type="text"] { flex:1; min-width:0; cursor:default; color:var(--text2); font-family:var(--font-mono); font-size:12px; }
  .dir-picker input[type="text"].has-value { color:var(--text); }
  .btn-pick-dir {
    display:flex; align-items:center; gap:6px; white-space:nowrap;
    background:var(--surface); border:1px solid var(--border2); border-radius:var(--radius-sm);
    padding:8px 12px; font-size:12.5px; font-weight:500; font-family:var(--font-sans);
    color:var(--text); cursor:pointer; transition:all var(--transition); flex-shrink:0;
  }
  .btn-pick-dir:hover { background:var(--surface2); border-color:var(--accent); color:var(--accent); }

  .dir-browser {
    margin-top: 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--surface);
    box-shadow: 0 2px 8px rgba(0,0,0,.05);
  }
  .dir-browser.hidden { display: none; }

  .dir-browser-nav {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 14px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .dir-nav-up {
    display: flex; align-items: center; gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 4px 10px;
    font-size: 12px; font-weight: 500;
    cursor: pointer; font-family: var(--font-sans);
    color: var(--text2);
    transition: all var(--transition);
    white-space: nowrap;
  }
  .dir-nav-up:hover { border-color: var(--border2); color: var(--text); background: var(--surface2); }
  .dir-nav-up:disabled { opacity: .35; cursor: default; }
  .dir-current-path {
    font-family: var(--font-mono);
    font-size: 11.5px;
    color: var(--text3);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 4px 10px;
  }

  .dir-list { max-height: 200px; overflow-y: auto; padding: 6px; }
  .dir-list::-webkit-scrollbar { width: 4px; }
  .dir-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  .dir-item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 12.5px;
    font-family: var(--font-mono);
    transition: background var(--transition);
    user-select: none;
    color: var(--text);
  }
  .dir-item:hover { background: var(--surface2); }
  .dir-item.selected {
    background: #fef0e8;
    color: var(--accent);
    font-weight: 500;
  }
  .dir-item-icon { flex-shrink: 0; }
  .dir-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .dir-item-enter {
    font-size: 11px; color: var(--text3);
    opacity: 0; transition: opacity var(--transition);
    font-family: var(--font-mono); white-space: nowrap;
  }
  .dir-item:hover .dir-item-enter { opacity: 1; }

  .dir-browser-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    gap: 12px;
  }
  .dir-select-hint {
    font-size: 12px; color: var(--text2);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    flex: 1; font-family: var(--font-mono);
  }
  .dir-select-hint b { color: var(--accent); font-weight: 600; }
  .btn-select-dir { font-size:12px; padding:5px 14px; flex-shrink:0; }

  .modal-footer { display:flex; justify-content:flex-end; gap:10px; margin-top:24px; }
  .btn-cancel  { background:transparent; border:1px solid var(--border); color:var(--text2); }
  .btn-primary { background:var(--accent); color:#fff; border:1px solid var(--accent); }
  .btn-primary:hover { background:var(--accent2); border-color:var(--accent2); }

  /* ── Toast ── */
  .toast-wrap { position:fixed; bottom:24px; right:24px; display:flex; flex-direction:column; gap:8px; z-index:300; }
  .toast { background:var(--text); color:#fff; padding:10px 16px; border-radius:8px; font-size:13px; box-shadow:var(--shadow-lg); animation:toastIn .2s ease; max-width:320px; }
  .toast.success { background:var(--green); }
  .toast.error   { background:var(--red); }
  @keyframes toastIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

  .hidden { display:none !important; }

  /* ── Resume Session Modal ── */
  .btn-resume { background: var(--blue); }
  .btn-resume:hover { background: #3a6a9a; }
  .resume-modal { width: 580px; }
  .resume-session-list { max-height: 400px; overflow-y: auto; margin-top: 12px; }
  .resume-loading { padding: 24px; text-align: center; color: var(--text3); font-size: 13px; }
  .resume-empty { padding: 24px; text-align: center; color: var(--text3); font-size: 13px; }
  .resume-item {
    display: flex; flex-direction: column; gap: 4px;
    padding: 12px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    margin-bottom: 8px; cursor: pointer; transition: all var(--transition);
  }
  .resume-item:hover { border-color: var(--blue); background: #f0f4f8; }
  .resume-item-header { display: flex; align-items: center; justify-content: space-between; }
  .resume-item-id { font-family: var(--font-mono); font-size: 11px; color: var(--text3); }
  .resume-item-time { font-size: 11px; color: var(--text3); }
  .resume-item-msg {
    font-size: 13px; color: var(--text); line-height: 1.5;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .resume-item-name {
    font-size: 12px; font-weight: 500; color: var(--blue);
  }

  /* ── Category Tabs ── */
  .category-tabs {
    display: flex; gap: 0; margin-right: 12px;
  }
  .category-tab {
    padding: 4px 12px; font-size: 12px; font-weight: 500;
    border: 1px solid var(--border); background: var(--surface2);
    cursor: pointer; color: var(--text2); transition: all var(--transition);
    font-family: var(--font-sans);
  }
  .category-tab:first-child { border-radius: var(--radius-sm) 0 0 var(--radius-sm); }
  .category-tab:last-child { border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
  .category-tab:not(:first-child) { border-left: none; }
  .category-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .category-tab .tab-count {
    display: inline-block; min-width: 16px; height: 16px; line-height: 16px;
    text-align: center; font-size: 10px; font-weight: 600;
    border-radius: 8px; margin-left: 4px;
    background: rgba(0,0,0,.1); color: inherit;
  }
  .category-tab.active .tab-count { background: rgba(255,255,255,.3); }

  /* ── Terminal Card ── */
  .grid-card.category-terminal { border-left-color: var(--blue) !important; }
  .grid-card.category-terminal .card-row1 { border-bottom-color: #dde8f0; }
  .shell-badge { background: #dde8f0; color: var(--blue); }
  .port-badge {
    font-size: 10px; font-family: var(--font-mono); padding: 1px 6px;
    border-radius: 10px; background: #e8f0e8; color: var(--green);
  }
  .card-restart-btn {
    font-size: 11px; color: var(--blue); border: 1px solid #c0d4e8;
    background: transparent; border-radius: var(--radius-sm);
    padding: 2px 8px; cursor: pointer; font-family: var(--font-sans);
    transition: all var(--transition);
  }
  .card-restart-btn:hover { background: #e8f0f8; }

  /* ── Recent Dirs ── */
  .recent-dirs {
    margin-top: 6px; max-height: 140px; overflow-y: auto;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--surface2);
  }
  .recent-dirs:empty { display: none; }
  .recent-dirs-label {
    font-size: 11px; color: var(--text3); padding: 6px 10px 2px;
    font-weight: 500; letter-spacing: .03em;
  }
  .recent-dir-item {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 10px; cursor: pointer; font-size: 12px;
    color: var(--text); transition: background var(--transition);
    font-family: var(--font-mono); overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
  }
  .recent-dir-item:hover { background: var(--border); }
  .recent-dir-item .rdir-icon { flex-shrink: 0; color: var(--accent); font-size: 11px; }
  .recent-dir-item .rdir-path { overflow: hidden; text-overflow: ellipsis; }

  /* ── Mobile Back Button ── */
  .mobile-back-btn {
    display:none; background:none; border:none; cursor:pointer;
    color:var(--text2); font-size:20px; padding:2px 6px; line-height:1;
  }

  /* ── Tunnel Status ── */
  .tunnel-status {
    display:flex; align-items:center; gap:6px; font-size:11px; color:var(--text2);
    cursor:pointer; padding:2px 8px; border-radius:var(--radius-sm);
    border:1px solid var(--border); background:var(--surface2);
    transition:all var(--transition); white-space:nowrap;
  }
  .tunnel-status:hover { border-color:var(--accent); color:var(--accent); }
  .tunnel-status .tunnel-dot {
    width:6px; height:6px; border-radius:50%; background:var(--border2); flex-shrink:0;
  }
  .tunnel-status .tunnel-dot.active { background:var(--green); }
  .tunnel-status .tunnel-dot.connecting { background:var(--yellow, #b08a2a); animation:pulse 1.5s infinite; }
  .tunnel-url-toast {
    position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
    background:var(--text); color:#fff; padding:12px 20px; border-radius:var(--radius);
    font-size:13px; font-family:var(--font-mono); z-index:400;
    box-shadow:0 4px 16px rgba(0,0,0,.2); animation:slideUp .2s ease;
    display:flex; align-items:center; gap:10px; max-width:90vw;
  }
  .tunnel-url-toast button {
    background:var(--accent); color:#fff; border:none; border-radius:var(--radius-sm);
    padding:4px 10px; font-size:12px; cursor:pointer; white-space:nowrap;
  }
  .tunnel-url-toast .tunnel-url-text {
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }

  /* ── Mobile Responsive ── */
  @media (max-width: 768px) {
    /* Header */
    header { padding:0 12px; gap:8px; height:48px; }
    .logo { font-size:13px; gap:6px; }
    .logo-icon { width:24px; height:24px; font-size:11px; border-radius:6px; }
    .header-stats { gap:8px; }
    .stat-item { font-size:11px; }
    .texture-picker { display:none; }
    .view-switcher { display:none; }
    .btn-new { padding:5px 8px; font-size:11px; }
    .btn-new svg { display:none; }

    /* Grid */
    .grid-header { padding:10px 12px 8px; }
    .grid-container {
      grid-template-columns:1fr !important;
      padding:0 12px 12px; gap:10px;
    }
    .grid-card { padding:12px; min-height:auto; gap:8px; }
    .card-output { max-height:48px; font-size:11px; }

    /* Floating windows -> fullscreen on mobile */
    .win-layer { z-index:150; }
    .float-win {
      position:fixed !important;
      left:0 !important; top:0 !important;
      width:100vw !important; height:100vh !important;
      min-width:0 !important; min-height:0 !important;
      border-radius:0 !important; border:none !important;
      z-index:150 !important;
    }
    .float-win .win-resize-edge { display:none; }
    .float-win .win-header {
      border-radius:0; cursor:default;
      padding:8px 10px; gap:6px;
    }
    .float-win .win-header:active { cursor:default; }
    .float-win .win-title { font-size:12px; }
    .float-win .win-meta { display:none; }
    .float-win .cli-badge { font-size:9px; }
    .float-win .git-branch-badge { font-size:9px; max-width:80px; }
    .float-win .win-actions { gap:4px; }
    .float-win .win-actions .btn { padding:3px 6px; font-size:10px; }
    .float-win .win-close { width:28px; height:28px; font-size:18px; }
    .mobile-back-btn { display:block; }

    /* Input bar mobile */
    .input-bar { padding:8px 10px; gap:6px; flex-wrap:wrap; }
    .quick-btns { gap:4px; order:2; width:100%; }
    .quick-btn { padding:6px 10px; font-size:12px; flex:1; text-align:center; }
    .input-field { font-size:16px; padding:8px 10px; order:0; flex:1; min-width:0; }
    .btn-send { padding:8px 14px; font-size:13px; order:1; }
    .input-waiting-label { font-size:11px; order:-1; width:100%; }

    /* Task queue panel mobile */
    .task-queue-panel {
      position:fixed; right:0; top:0; bottom:0; width:280px; z-index:200;
      box-shadow:-4px 0 16px rgba(0,0,0,.15);
    }

    /* Modal mobile */
    .overlay { align-items:flex-end; }
    .modal {
      width:100%; max-width:100%; border-radius:14px 14px 0 0;
      max-height:85vh; padding:20px;
    }
    .modal-title { font-size:15px; margin-bottom:14px; }
    .field input, .field textarea, .field select { font-size:16px; }
    .dir-picker { flex-wrap:wrap; }

    /* Login mobile */
    .login-box { width:90%; padding:28px 20px; }

    /* AI modals */
    .ai-explain-modal { width:95%; padding:20px; }
    .ai-settings-overlay .modal { width:100%; }

    /* Kanban scroll */
    .grid-container.view-kanban { flex-direction:column; }
    .kanban-col { max-width:none; min-width:0; }

    /* Card inline input mobile */
    .card-inline-input { flex-wrap:wrap; }
    .card-inline-input .card-quick-btn { padding:6px 12px; font-size:12px; }
    .card-inline-input .card-inline-field { font-size:16px; min-width:100px; }
  }

  /* Small phones */
  @media (max-width: 380px) {
    header { height:44px; }
    .logo { font-size:12px; }
    .header-stats .stat-item:not(:first-child):not(:last-child) { display:none; }
    .grid-container { padding:0 8px 8px; }
  }

  /* ── AI Explain Panel ── */
  .ai-explain-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,.25);
    display:flex; align-items:center; justify-content:center;
    z-index:200; animation:fadeIn .15s ease;
  }
  .ai-explain-overlay.hidden { display:none; }
  .ai-explain-modal {
    background:var(--surface); border-radius:14px; width:560px;
    box-shadow:var(--shadow-lg); padding:28px;
    animation:slideUp .2s ease; max-height:80vh; display:flex; flex-direction:column;
  }
  .ai-explain-title {
    font-size:16px; font-weight:600; margin-bottom:16px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .ai-explain-close {
    background:none; border:none; cursor:pointer;
    color:var(--text3); font-size:18px; padding:4px 8px;
    border-radius:4px; transition:color var(--transition);
  }
  .ai-explain-close:hover { color:var(--text); }
  .ai-explain-content {
    flex:1; overflow-y:auto; font-size:13.5px; line-height:1.7;
    color:var(--text); white-space:pre-wrap; font-family:var(--font-sans);
    padding:16px; background:var(--surface2); border-radius:var(--radius);
    border:1px solid var(--border);
  }
  .ai-explain-content.loading { text-align:center; color:var(--text3); padding:40px 16px; }
  .ai-explain-footer {
    display:flex; justify-content:flex-end; align-items:center; margin-top:16px; gap:8px;
  }

  /* ── AI Settings Modal ── */
  .ai-settings-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,.25);
    display:flex; align-items:center; justify-content:center;
    z-index:210; animation:fadeIn .15s ease;
  }
  .ai-settings-overlay.hidden { display:none; }
  .field select {
    width:100%; border:1px solid var(--border); border-radius:var(--radius-sm);
    padding:9px 12px; font-size:13.5px; font-family:var(--font-sans);
    background:var(--bg); color:var(--text); outline:none;
    transition:border-color var(--transition);
  }
  .field select:focus { border-color:var(--accent); background:var(--surface); }
  .btn-ai-explain {
    background:#e8f0fa; border:1px solid var(--blue); color:var(--blue);
    border-radius:var(--radius-sm); padding:5px 10px;
    font-size:12px; cursor:pointer; font-family:var(--font-sans); font-weight:500;
    transition:all var(--transition); display:none;
  }
  .btn-ai-explain:hover { background:#d0e3f5; }
  .header-settings-btn {
    background:none; border:none; cursor:pointer; color:var(--text2);
    font-size:16px; padding:2px 6px; border-radius:4px;
    transition:color var(--transition);
  }
  .header-settings-btn:hover { color:var(--accent); }

  /* ── Texture Picker ── */
  .texture-picker { display:flex; align-items:center; gap:5px; }
  .texture-swatch {
    width:22px; height:22px; border-radius:4px; cursor:pointer;
    border:1.5px solid var(--border); background-color:var(--bg);
    transition:border-color .2s, box-shadow .2s;
  }
  .texture-swatch:hover { border-color:var(--text2); }
  .texture-swatch.active { border-color:var(--accent); box-shadow:0 0 0 2px rgba(196,78,46,.2); }
  .tp-none { background:var(--bg); }
  .tp-dots {
    background-image:radial-gradient(circle, #a09a93 1px, transparent 1px);
    background-size:5px 5px;
  }
  .tp-grid {
    background-image:linear-gradient(90deg, #a09a93 1px, transparent 1px),
                     linear-gradient(#a09a93 1px, transparent 1px);
    background-size:6px 6px;
  }
  .tp-diagonal {
    background-image:repeating-linear-gradient(45deg, transparent, transparent 4px, #a09a93 4px 4.5px),
                     repeating-linear-gradient(-45deg, transparent, transparent 4px, #a09a93 4px 4.5px);
  }
  .tp-cross {
    background-image:radial-gradient(circle, #a09a93 .8px, transparent .8px);
    background-size:7px 7px;
  }
  .tp-noise {
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.25'/%3E%3C/svg%3E");
    background-size:100px 100px;
  }

  /* ── Page Textures (applied to body) ── */
  body.texture-dots {
    background-image:radial-gradient(circle, #ccc5be .8px, transparent .8px);
    background-size:20px 20px; background-attachment:fixed;
  }
  body.texture-grid {
    background-image:linear-gradient(90deg, #0000000a 1px, transparent 1px),
                     linear-gradient(#0000000a 1px, transparent 1px);
    background-size:28px 28px; background-attachment:fixed;
  }
  body.texture-diagonal {
    background-image:repeating-linear-gradient(45deg, transparent, transparent 10px, #00000008 10px 11px),
                     repeating-linear-gradient(-45deg, transparent, transparent 10px, #00000008 10px 11px);
    background-attachment:fixed;
  }
  body.texture-cross {
    background-image:radial-gradient(circle, #0000000f 1px, transparent 1px);
    background-size:24px 24px; background-attachment:fixed;
  }
  body.texture-cross::before {
    content:""; pointer-events:none;
    background-image:radial-gradient(circle, #0000000f 1px, transparent 1px);
    background-position:12px 12px; background-size:24px 24px;
    position:fixed; inset:0; z-index:-1;
  }
  body.texture-noise { position:relative; }
  body.texture-noise::before {
    content:""; pointer-events:none; z-index:-1;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.12'/%3E%3C/svg%3E");
    background-size:256px 256px; position:fixed; inset:0;
  }

  /* ── Custom Background Image ── */
  body.has-bg-image header {
    background: rgba(244, 242, 238, 0.78);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }
  body.has-bg-image .grid-card {
    background: rgba(255, 255, 255, 0.80);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  body.has-bg-image .modal {
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }

  /* ── Login Overlay ── */
  .login-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
  }
  .login-overlay.hidden { display: none !important; }
  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 40px;
    width: 360px;
    box-shadow: var(--shadow-lg);
    text-align: center;
  }
  .login-box .logo-icon {
    width: 48px; height: 48px; font-size: 20px; border-radius: 12px;
    margin: 0 auto 16px;
  }
  .login-box h2 {
    font-size: 18px; font-weight: 600; margin-bottom: 4px;
  }
  .login-box .subtitle {
    font-size: 13px; color: var(--text2); margin-bottom: 24px;
  }
  .login-box input[type="password"] {
    width: 100%; padding: 10px 14px;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-size: 14px; font-family: var(--font-mono);
    background: var(--surface2); outline: none;
    transition: border-color var(--transition);
  }
  .login-box input[type="password"]:focus {
    border-color: var(--accent);
  }
  .login-box .login-btn {
    width: 100%; margin-top: 14px; padding: 10px;
    background: var(--accent); color: #fff; border: none;
    border-radius: var(--radius-sm); font-size: 14px;
    font-weight: 500; cursor: pointer;
    transition: background var(--transition);
  }
  .login-box .login-btn:hover { background: var(--accent2); }
  .login-box .login-btn:disabled { opacity: .6; cursor: not-allowed; }
  .login-error {
    color: var(--red); font-size: 13px; margin-top: 10px;
    min-height: 20px;
  }
</style>
</head>
<body>

<!-- 登录遮罩层 -->
<div class="login-overlay" id="login-overlay">
  <div class="login-box">
    <div class="logo-icon" style="display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-family:var(--font-mono);background:var(--accent)">CC</div>
    <h2 data-i18n="login.title">Claude Code 管理器</h2>
    <div class="subtitle" data-i18n="login.subtitle">请输入访问密码</div>
    <form id="login-form" autocomplete="off">
      <input type="password" id="login-password" placeholder="密码" data-i18n-placeholder="login.password_placeholder" autofocus />
      <button type="submit" class="login-btn" id="login-btn" data-i18n="login.btn">登 录</button>
    </form>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<header>
  <div class="logo">
    <div class="logo-icon">CC</div>
    <span data-i18n="header.title">Claude Code · 多实例管理器</span>
  </div>
  <div class="header-stats">
    <div class="stat-item">
      <div class="stat-dot" id="ws-dot"></div>
      <span id="ws-status">连接中…</span>
    </div>
    <div class="stat-item"><span id="stat-total">0 个实例</span></div>
    <div class="stat-item">
      <div class="stat-dot running"></div>
      <span id="stat-running">0 运行中</span>
    </div>
    <div class="texture-picker" id="texture-picker">
      <button class="texture-swatch tp-none active" data-texture="none" title="无底纹" data-i18n-title="texture.none"></button>
      <button class="texture-swatch tp-dots" data-texture="dots" title="圆点" data-i18n-title="texture.dots"></button>
      <button class="texture-swatch tp-grid" data-texture="grid" title="网格" data-i18n-title="texture.grid"></button>
      <button class="texture-swatch tp-diagonal" data-texture="diagonal" title="斜线" data-i18n-title="texture.diagonal"></button>
      <button class="texture-swatch tp-cross" data-texture="cross" title="交叉点" data-i18n-title="texture.cross"></button>
      <button class="texture-swatch tp-noise" data-texture="noise" title="噪点" data-i18n-title="texture.noise"></button>
    </div>
    <div class="tunnel-status" id="tunnel-status" style="display:none" title="点击查看远程访问地址">
      <span class="tunnel-dot" id="tunnel-dot"></span>
      <span id="tunnel-label">Tunnel</span>
    </div>
    <button class="lang-btn" id="btn-lang-toggle">EN</button>
    <button class="header-settings-btn" id="btn-open-ai-settings" title="设置" data-i18n-title="header.settings_title">&#9881;</button>
    <button class="btn-new btn-resume" id="btn-open-resume" title="恢复最近的 Claude Code 会话" data-i18n-title="header.resume_title">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M1 6a5 5 0 1 1 1.5 3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M1 10V6.5h3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span data-i18n="header.resume_btn">恢复会话</span>
    </button>
    <button class="btn-new" id="btn-open-modal">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <span data-i18n="header.new_btn">新建实例</span>
    </button>
  </div>
</header>

<div class="layout">
  <!-- Grid Overview -->
  <div class="grid-view" id="grid-view">
    <div class="grid-header">
      <span class="grid-title" data-i18n="grid.title">实例概览</span>
      <div class="category-tabs" id="category-tabs">
        <button class="category-tab active" data-cat="all">全部<span class="tab-count" id="tab-count-all">0</span></button>
        <button class="category-tab" data-cat="agent">Agent<span class="tab-count" id="tab-count-agent">0</span></button>
        <button class="category-tab" data-cat="terminal">终端<span class="tab-count" id="tab-count-terminal">0</span></button>
      </div>
      <div class="view-switcher" id="view-switcher">
        <button class="view-mode-btn active" data-view="card" data-i18n="grid.view_card">卡片</button>
        <button class="view-mode-btn" data-view="list" data-i18n="grid.view_list">列表</button>
        <button class="view-mode-btn" data-view="compact" data-i18n="grid.view_compact">紧凑</button>
        <button class="view-mode-btn" data-view="kanban" data-i18n="grid.view_kanban">看板</button>
        <button class="view-mode-btn" data-view="waterfall" data-i18n="grid.view_waterfall">瀑布</button>
        <button class="view-mode-btn" data-view="minimal" data-i18n="grid.view_minimal">极简</button>
        <button class="view-mode-btn" data-view="industrial" data-i18n="grid.view_industrial">工业</button>
      </div>
    </div>
    <div class="grid-container" id="grid-container">
      <div class="empty-state"><div class="empty-icon">&#9633;</div><div>暂无实例<br/>点击上方「新建实例」开始</div></div>
    </div>
  </div>

  <!-- Floating Window Layer -->
  <div class="win-layer" id="win-layer"></div>
</div>

<!-- Modal -->
<div class="overlay hidden" id="modal-overlay">
  <div class="modal">
    <div class="modal-title" data-i18n="modal.title">新建实例</div>
    <div class="modal-mode-switcher" id="modal-mode-switcher">
      <button class="modal-mode-btn active" data-mode="agent" data-i18n="modal.mode_agent">AI Agent</button>
      <button class="modal-mode-btn" data-mode="terminal" data-i18n="modal.mode_terminal">终端命令</button>
    </div>
    <!-- Agent Mode Fields -->
    <div id="agent-fields">
    <div class="cli-type-selector" id="cli-type-selector"></div>
    <div class="field">
      <label data-i18n="modal.agent.name_label">实例名称（可选）</label>
      <input type="text" id="f-label" placeholder="例：重构登录模块" data-i18n-placeholder="modal.agent.name_placeholder" />
    </div>
    <div class="field">
      <label data-i18n="modal.agent.prompt_label">Prompt（可选）</label>
      <textarea id="f-prompt" placeholder="请输入你想让 Claude Code 执行的任务..." data-i18n-placeholder="modal.agent.prompt_placeholder"></textarea>
    </div>
    <div class="field">
      <label data-i18n="modal.agent.attachment_label">附件截图（可选）</label>
      <div style="display:flex;gap:8px;align-items:center;">
        <input type="file" id="f-image" accept="image/*" style="display:none" />

let currentLang = localStorage.getItem('lang') || 'zh';

function t(key, ...args) {
  const dict = TRANSLATIONS[currentLang] || TRANSLATIONS.zh;
  const val = (key in dict) ? dict[key] : ((key in TRANSLATIONS.zh) ? TRANSLATIONS.zh[key] : key);
  return typeof val === 'function' ? val(...args) : val;
}

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.dataset.i18nPlaceholder);
  });
  document.querySelectorAll('[data-i18n-title]').forEach(el => {
    el.title = t(el.dataset.i18nTitle);
  });
  // Category tabs (preserve count spans)
  [['all','grid.cat_all'], ['agent','grid.cat_agent'], ['terminal','grid.cat_terminal']].forEach(([cat, key]) => {
    const btn = document.querySelector('[data-cat="' + cat + '"]');
    if (!btn) return;
    const countEl = btn.querySelector('.tab-count');
    btn.textContent = t(key);
    if (countEl) btn.appendChild(countEl);
  });
  // perm-mode and effort default options
  document.querySelectorAll('[data-i18n]').forEach(el => {
    if (el.tagName === 'OPTION') el.textContent = t(el.dataset.i18n);
  });
  // WS status
  const wsStatus = document.getElementById('ws-status');
  if (wsStatus) {
    const stateMap = { connecting: 'header.connecting', connected: 'header.connected',
      disconnected: 'header.disconnected', demo: 'header.demo_mode' };
    wsStatus.textContent = t(stateMap[wsStatus.dataset.wsState || 'connecting'] || 'header.connecting');
  }
  // Stats
  updateStats();
  // Lang button
  const langBtn = document.getElementById('btn-lang-toggle');
  if (langBtn) langBtn.textContent = currentLang === 'zh' ? 'EN' : '中';
  // Document title & re-render
  updateDocTitle();
  renderGrid();
  // updatePasswordUI re-applies translated label
  updatePasswordUI();
}
